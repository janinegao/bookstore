  <script>
  const booksData = [
  {
    "id": "26", "isNew": true,
    "title": "其中一个是谎言",
    "author": "[韩]金爱烂",
    "cover": "covers/26.jpeg",
    "detailTitle": "《其中一个是谎言》：我曾在市场里管陌生人叫妈妈",
    "quote": "实际上，游戏中最重要的是说出“谁都可以听”“可以告诉任何人”的真相。",
    "note": "收到了出版社赠书，是韩女作家金爱烂的新书《其中一个是谎言》。\n\n此前读过金爱烂作家的《外面是夏天》，笔力惊人，印象更为深刻的是她敢于触碰\u201c失去\u201d的主题。淡淡的文字牵扯出生命不可承受之痛，产生一种奇妙的化学反应。\n\n很喜欢新书的名字《其中一个是谎言》，引人遐想。这个精心编织的谎言是什么？它会怎样被巧妙地引出？谎言背后有怎样的暗涌？复杂关系会如何交织在谎言之中？\n\n然而，故事并没有朝着想象的方向中展开。\n\n其中一个是谎言，其实是一个破冰小游戏。用5个句子介绍自己，有一句是谎言。\n\n起初，这个小游戏是在班级里的自我介绍中进行的。主角之一智宇的句子中包括：我和蜥蜴一起生活。这个游戏的精巧之处在于，一个简单的句子，会不经意地带出句子背后的人生困局。智宇的困局，是不清楚妈妈是否为了骗保而死，以及妈妈死后和他建立深度关系的，只有这只名为龙植的蜥蜴。\n\n后来，这个小游戏在作家的叙事中层层递进，带出了大人沉重的秘密。智宇继父借游戏之名说了这5个句子：\n\n——我小时候经常挨父亲的打。\n——我曾经庆幸父亲死得早。\n——为了不被公司炒鱿鱼，我曾经背叛过同事。\n——我真心爱你妈妈。\n——我很高兴和你一起生活。\n\n从沉重到温情。说完这5个句子，继父微微一笑：抱歉我违反游戏规则了，这5句话里没有谎言。\n\n以其中一个是谎言为故事的线头，结构上也有层层递进，但过于规整了，反而显得刻意。故事的架构不太像一个长篇，而像三个彼此独立、略显割裂的短篇。\n\n故事里的三个少年，因为一只狗、一只蜥蜴、一部漫画而建立联系，但三人之间似乎没有建立起某种深度关系。一些特定事件，是能够建立起深度关系的，但在这个故事里那种深度关系的宿命感偏弱。\n\n最后说一下文字。\n\n采云妈妈在狱中写的那封信，文字力量是惊人的，仿佛金爱烂作家就站在人物的身后。开头几笔，写出了一个母亲的愧疚，\u201c采云啊，你独自来到了这个地图上都找不到的地方，飘荡着怪味的地方\u201d；也有爱情最初的样子，\u201c我好像被那种刹那间的松弛迷住了。感觉像是偷窥到了一天只短暂开放一次的城堡的内景，然后就想进入内部。\u201d\n\n但更绝望的是逐渐破败、变质的关系。散落在家中各处永远也捡不完的牙签、放置在客厅中央的单人沙发和烧酒杯，随即是家庭暴力、染血的刀与无措的少年。\n\n细节有亮点，但整体低于预期。"   },

    "detailTitle": "《悉达多》：寻找阿特曼，内在的我",
    "cover": "covers/01.jpeg",
    "quote": "我唯一的事，是爱这个世界。不藐视世界，不憎恶世界和自己。怀抱爱，惊叹和敬畏地注视一切存在之物和我自己。",
    "note": "至少有 5 个人和我说过自己最喜欢的书是《悉达多》。为什么人人都放不下悉达多？或许是因为每个人都在寻找「阿特曼」，内在的我。\n\n「自我探寻」一直是我们播客（小宇宙：书读完了）里最受欢迎的主题，比如《被讨厌的勇气》《我们内心的冲突》《纳瓦尔宝典》等等。但不同于心理学、人生指南类书籍，《悉达多》用充满诗性的语言，短短几万字，带你走完人生的旅程。\n\n《悉达多》故事的主线很明确——寻找内在的我。\n\n悉达多并非普通人叙事。他是「俊美的婆罗门之子，年轻的鹰隼」。父母看到他，「幸福便在心中胸中跃动」；婆罗门女儿们看见他，「心中泛起爱情的涟漪」；他还有最忠实的朋友和随从，乔文达，他要做「他的朋友，他的随从，他的仆人，他的侍卫，他的影子」。\n\n悉达多从一开始就是一个「拥有一切」的人。但他却无法令自己感到喜悦。\n\n于是他走上了自我探寻之路。「内在我之源泉，必须拥有自己的阿特曼！其他一切都只是寻觅、走弯路和误入歧途。」\n\n一开始，他投身沙门，扼杀感官、毁灭记忆、弃绝欲望。但他很快发现，沙门的教义有逻辑断裂之处，「在明晰又可敬的法义中不包含世尊的历程，那个世尊佛陀独自超越众生的秘密」。\n\n悉达多敏锐地发现了其中的关键之处，他试图以思想之网去捕捉自我，从而使得自我从未被真正发现。但思想之我与感官之我，两者均可听到内在的秘密之声。\n\n于是悉达多彻底地投入了感官世界。他认识了迦摩罗，在甜蜜的爱情中度过了绝妙的时光；他也曾沉溺于卑劣的赌博，体会过那种掷骰子、豪赌时那种剧烈的快感。他还曾有过一个与他相同面孔的孩子，亲情令其心潮起伏，但孩子终究逃离了他，走向自己的命运。\n\n悉达多在感官世界的极致之中周旋，疲惫不堪。最终，悉达多不是在法义、思想，而是在自己亲历过的生命中顿悟：「我唯一的事，是爱这个世界。不藐视世界，不憎恶世界和自己。怀抱爱，惊叹和敬畏地注视一切存在之物和我自己」。\n\n实际上，悉达多用自己生命的旅程，补足了此前他发现的佛陀教义中的逻辑断裂之处——比起思想，他更在意物。这让我想到《狐狸》的第一章，故事之为故事的故事，也没有去讲故事的理论和教义，而是让带读者亲历故事如何一卷卷展开，线索连着线索，情绪接着情绪。\n\n至于如何找到内在的我，没人能看清他者的道路。每个人需要再自己的生命中探寻，这或许注定是一条孤独的路。\n\n因此每个人看《悉达多》，看到的切面是不一样的。\n\n2023年2月我看《悉达多》时，莫名非常关注一条支线，即乔文达和悉达多的友谊是如何分道扬镳的。可能我当时正在经历一段分道扬镳的友谊，有所感。\n\n2026年6月我再看《悉达多》，我很羡慕的地方不在于悉达多求道的终点抵达了「圆满」，而在于过程中他拥有的深度关系和极致体验。乔文达和悉达多是一种深度关系，悉达多与迦摩罗也是一种深度关系。深度关系带来喜悦和人生的华彩。\n\n对于寻找内在之我这一主线，我没有那么困惑，我的人生主线是完成作品。所以我最喜欢的书在另外的赛道，有完整世界观的，虚构却令人完全信服的——《那不勒斯四部曲》《三体》《哈利波特》。有时间会继续补笔记。\n\n最后还是要盛赞一下黑塞诗性的语言，对文字的掌控力无需多言。"
  },
  {
    "id": "02",
    "title": "狼人杀：别慌！我守卫还在",
    "author": "狼人杀小聪明",
    "cover": "covers/02.jpeg",
    "quote": "狼人杀有充分理由成立为一本书！",
    "note": "第 24 本书，我早早想好要读一部长篇。这个网页排版顺序是倒序，排在第一的，是我最近读的书。\n\n统计了一下，我目前精读的书有 85 本（每一页都没有跳过的那种）；读完并且有完整读书笔记的书是 24 本。85 本书里，短篇的确要更多，但能够深刻留在我记忆中的，那种完整世界观的震撼，还是大长篇，比如《哈利波特》、《那不勒斯四部曲》、《三体》。\n\n一开始，我给自己选定的书是《米德尔马契》，但鬼使神差地，我打开了番茄小说的《狼人杀：别慌！我守卫还在》。读到一半，已经有点想不起来，是怎么拐到狼坑里去的呢…\n\n简单说一下我读这本书的心路历程：\n- 原来狼人杀是这么玩的啊？\n- 原来预言家是一张孙子牌啊？\n- 原来狼窝也是可以很温暖的啊？\n\n我目前印象最深的一局，是主角 the Chariot 战车拿预言家的一局。那种关注每一张牌发言的卑微感，被好人说\"发言如沐春风\"的得意感，以及狼人对跳，被迫加班的无奈感……体验拉满！\n\n还有一局，the Chariot 拿到的是狼人牌。狼窝里原本三狼，但场上存在第三方\"亡灵阵营\"，10号狼枪在未开枪状态下被亡灵带走，紧接着 4号小狼也被亡灵附身，眼看着狼队友们一个接一个离开温暖的狼窝，孤狼的绝望感谁懂啊哈哈哈哈…\n\n上一本《创意行为》里基本上已经确定了创作方法论，第一步是收集种子。狼人杀也可以是种子之一。这本书的追更动力是把把高端局的情况下，下一把还能怎么玩？以及还没有揭晓选手们进入巴别塔狼人杀比赛的真正动机——也就是世界观的完整叙事。目前看来 the Temperance 节制、the Empress 女皇这三个人是有一些人物关系的，比如节制怎么老给战车送千纸鹤啊！\n\n带着这些疑问读到最后，发现这本书的在世界观的叙述上是不充分的，作者自己也意识到了这一点。但没关系，读本书的真正启示是：只要你有真正想表达的东西，对某一个领域有足够多的了解，它就可以成立为一本书！狼人杀有充分理由成立为一本书！\n\n发现兴趣，才是最关键的。"   },
  {
    "id": "03",
    "title": "创意行为：存在即答案",
    "author": "里克·鲁宾",
    "cover": "covers/03.jpeg",
    "quote": "素材像一条河，穿过我们。",
    "note": "我在每日豆瓣上种草的这本书。\n\n对于创作者来说，这本书非常治愈。书里最打动我的一句话，也是创作的本源在于：丰盛之心。\n\n\"素材像一条河，穿过我们。当我们把自己的作品和想法分享出去时，新的素材就会补充进来。如果我们把它们都憋在心里，阻碍了流动，新的想法也就迟迟不会出现。有丰盛的心态，河流就永远不会干涸。创意总是会到来的。艺术家纵情挥洒，不用怀疑会有更多的创意持续到来。\"\n\n这本书让我意识到我的问题所在：总是认为自己不够好。总是优先考虑其它事项和责任，把创作往后放。\n\n这本书如何拆解创作过程：采集种子——不断测试——完成作品。\n\n什么是种子？对于一部文字作品，可能是一句话，一个角色小传、一个背景设定、一个主题或者一个情节。如果种子是一部小说中的一个角色，我们可能会扩大他生活的世界，发展他的背景故事，或者自己成为这个角色，从他的视角开始写作。\n\n\"积累的种子越多，判断起来就越容易。如果你收集了 100 粒种子，你可能会发现第 54 粒能让你产生一种独特的感觉，别的种子都做不到。但如果你只有这一粒，没有其它种子做对比，就更难判断。\"\n\n当你收集了足够多的种子之后会发现，探索的方向数不胜数，我们不可能不做测试，就能预知哪个方向是死胡同，哪个方向会引领我们进入新的领域。\n\n接下来就是完成作品了。这本书几乎每句话都是在帮你降低创作的门槛。\"你的创作不是非得被见证、被记录、被售卖或被装裱，才能成为艺术作品。在平凡的存在状态之中，我们时刻创造着自己的现实经验，构成我们所感知的世界。这已经让我们以最深刻的方式成为创作者。\"\n\n所以真的不要纠结自己到底有没有天赋了。如果你已经决心做这件事了，天赋真的那么重要吗？"   },
  {
    "id": "04",
    "title": "即使以最微弱的光",
    "author": "崔恩荣",
    "cover": "covers/04.jpeg",
    "quote": "闭上眼睛，感受每一个短暂而柔软的瞬间",
    "note": "《即使以最微弱的光》收录了崔恩荣的 7 篇作品。\n\n这本书特别难写的地方在于，它描写的是再普通不过的日常——老师和学生，实习生和职场前辈，姐妹，我和舅舅，我和姨妈，编辑部的社员们，外婆和孙子。\n\n很容易陷入琐碎。如果换做普通人来写，大概就是流水账一般的日记吧。\n\n但在崔恩荣笔下，寻常生活里的「刺」慢慢浮现出来。留白处，是某种冰冷、坚硬、沉重的东西。是内心深处不会消失的房间。\n\n文学评论提到——\n崔恩荣的小说向来以\"被动的行为所具有的活力\"而著称。\n\n仔细想了一下这句话，大概是指女性的「被动处境」？当她们处在被遗弃、被家暴、被出轨的「被动处境」中时，活力就是书名里的「微弱的光」。即使是一段生命过客般的、转瞬即逝的温暖。\n\n— 《一年》中实习生和职场前辈突破\"社会规则中最低限度的礼貌\"，诉说心底的秘密\n— 《回信》中妹妹为了保护被家暴的姐姐果断出手，但因此进了监狱\n— 《分内之事》中希荣和海珍的相互欣赏，让我想到天才女友中的莉拉和莱农……\n\n她们闭上眼睛，感受这份微光，把它留存在生命记忆里。\n\n我最喜欢《消失的，永不消失的》。原因是一个短篇竟然容纳了如此丰富的关系和情绪：\n— 母女：基男和母亲，基男从小被母亲遗弃\n— 母女：基男和亲生女儿，冷漠、疏离\n— 母女：基男和继女，温暖、亲近\n— 夫妻：基男女儿的丈夫詹姆斯只是短暂出场，已经令人作呕\n— 外婆和孙子：小朋友观察一切，读懂空气，给基男带来一丝宽慰\n\n全书我最喜欢的段落也出自这个短篇：\n小时候，基男最甜蜜的梦想就是毫无痛苦地死去，从世界上消失。没有什么比这个想法更能带给基男安慰。五岁的真景走进基男的世界，三年后宥景出生了。她越来越爱孩子，死亡的观念带给她的不再是安慰，而是恐惧。现在，基男不害怕了。孩子们会撑住。心情凄凉到不可抑制的时候，她确信自己的死亡将会带给孩子们自由。\n\n通过描写一个女人对于死亡的态度，刻画了基男的一生：被遗弃的童年、被孩子治愈的中年、心情凄凉的老年……\n\n崔恩荣作家真的太会写了。\n\n结尾处作家的话令人心碎：我是在各个方面都很缺乏的人，从很小的时候开始，我就经常感觉生活是不得不支付的罚单。\n\n希望崔恩荣作家也能在心里永远留住每一束微弱的光。"   },
  {
    "id": "05",
    "title": "德米安",
    "author": "赫尔曼·黑塞",
    "cover": "covers/05.jpeg",
    "quote": "你永远可以相信黑塞的文字力量",
    "note": "谁是德米安？\n\n辛克莱（本书主人公）的引路人。也是黑塞本人的投影。\n\n在孩童时期，德米安和所有人都不一样。\"他有着一种完全独特的气质，一种不加掩饰的个体印记，他毫无疑问是引人注目的，可同时，他又竭力让自己看起来毫不起眼，就像是一个伪装成普通孩子的王子，在村童之间小心翼翼地模仿着他们的样子，努力不让自己太显眼。\"\n\n德米安帮辛克莱摆脱霸凌困境。\n德米安让辛克莱重新认识该隐的故事，掀起辛克莱内心深处最深的反叛——\"看穿了父亲和他所代表的那个光明世界（精神弑父）\"\n是德米安，也是黑塞自己。结尾处，德米安和主人公\"我\"镜像重合。\"我只需俯身望向那面黑镜，就会看见自己的影像，那张脸，如今已完全与他相似，他，我的挚友和领路人。\"\n\n永恒母题：寻找\"阿特曼\"\n\n《德米安》和《悉达多》主题一致：寻找\"阿特曼\"，内在的我。前者创作时间更早，更偏向于内心独白，后者的叙事更加成熟。\n\n尽管主题一致，读《德米安》时还是被这段清晰的文字震撼到：\n以前我常常用未来的图景来做游戏，我幻想着也许将成为一个诗人、一个先知、一个画家，或其他什么人。但这些都毫无意义。我存在，不是为了写诗，不是为了传道，也不是为了作画。没有一个人是为了这些而生的。这些不过是附带发生的事。每个人真正的天职，只有一个：走向他自己。他最终可能成为诗人，也可能成为疯子、先知、罪犯，这些都无关紧要，甚至毫无意义。他的使命，是找到属于自己的命运，而不是随意的某个命运，并将其在自己身上完整而彻底地活出来。我是大自然的一个投掷，一次掷向未知的试验，或许为了某种新生，或许只是虚无。\n\n你永远可以相信黑塞的文字力量\n\n已读黑塞的三本书，按个人偏好阅读顺序如下：《悉达多》＞ 《克林索尔的最后夏天》＞ 《德米安》\n《悉达多》是永恒经典。\n《克林索尔的最后夏天》的文字如调色盘一般富有美感。\n而读《德米安》，足以让每个人掀起一场\"内在风暴\"。"   },
  {
    "id": "06",
    "title": "纳瓦尔宝典",
    "author": "纳瓦尔·拉威康特",
    "cover": "covers/06.jpeg",
    "quote": "一个必须自我追问的问题：你的独特价值是什么？",
    "note": "把自己打造成产品（Productize Yourself），这个句式和项飙的\"把自己作为方法\"很像。都是在说，更好地了解自己。\n\n纳瓦尔在近期访谈《关于人性的 44 个残酷真相》中说，找到那些对你来说像游戏，但对别人来说像工作的事情。\n\n这是把自己打造成产品第一步。但我们从小按部就班的学习、学习、学习……一晃 30 岁，很多人被问到什么是自己的\"兴趣\"时，还是一脸茫然。我们太缺乏一个发现兴趣的试错过程。\n\n\"在成为自己这件事情上，没有人能比得过你。其实，人生大部分时间都是在寻找，寻找那些最需要你的人，寻找那些最需要你的事情。\"\n\n一个关键的问题是：我能提供什么独特的价值？\n\n\"无论处于人生的哪个阶段，努力的目标都是不断提高自己的独立性，而不是升职加薪。拥有独立性，为自己独特的产出成果负责（而不是像打工一样为投入的时间负责），这才是最理想的状态。\"纳瓦尔说。\n\n找到你天生擅长、世界需要且可规模化的事之后，接下来就是将其转化为产品。\n\n关于执行过程，纳瓦尔修正了著名的\"一万小时定律\"。他认为\"一万小时定律\"并非只是一万小时机械重复，而是\"一万次迭代\"。迭代的次数推动学习曲线的上升。如果你在任何事情上进行了一万次纠错，你就会成为这方面的专家。\n\n最近我也一直在问自己这个问题：我的独特性是什么，我能提供什么独特的产出。\n\n纳瓦尔说，如果弄清楚自己的最佳时间是\"之前\"，第二好的时间就是\"现在\"。所以读纳瓦尔，越早越好！但现在看到也不晚：）因为：\n\n\"最大的错误是过早地做出选择。如果过早决定成为一名律师或医生，五年后可能发现自己错过了其它机会，最终在错误的职业、错误的位置，和错误的人在一起，辛苦地度过三十年的人生。\""   },
  {
    "id": "07",
    "title": "长书当诉",
    "author": "戴安娜·阿西尔",
    "cover": "covers/07.jpeg",
    "quote": "《暮色将尽》作者出新书了",
    "note": "《长书当诉》是英国女作家戴安娜·阿西尔的新书。\n\n她更有名的一部作品是《暮色将尽》，前者写于43岁，后者写于89岁，分别叙述了她的中年和老年生活。\n\n阿西尔的独特之处在于她\"诚实到绝\"的叙述风格，在回忆录中，人很难不美化自己，这是人性。因此阿西尔的坦率是罕见的。\n\n《暮色将尽》读完已经整整两年，留在我心里的感受依然没有消退：\n— 比如她关于衰老的态度——一本讲老年的书不一定要以呜咽收场，当然也不可能锣鼓喧天。\n— 比如她的写作经历——如果你想写小说，70岁也不晚！戴安娜·阿西尔就是76岁退休后才开始进行文学创作。\n\n于是我抱着相当高的期待打开了这本新书《长书当诉》。\n\n序言很吸引我，它出自另一位英国女作家安德烈娅·阿什沃思之手。她认为阿西尔是一位\"诚实的人类心理解剖学家\"：\n— \"她以一种惊人的、现代的，对个人经历全无拘谨或藏匿的方式对着她的读者说话，从不无端地耸人听闻或者不胜其烦地忏悔。\"\n— \"她从不害怕谈论别人可能会回避的事情。\"\n\n不能更赞同了。\n\n但读完本书，对于安德烈娅对这本书的总结有一些不同的感受，她提到《长书当诉》的核心是阿西尔第一次坠入爱河，最终遭受严重的失望、悲伤和孤独的打击，导致自尊受到侵蚀的悲惨故事。\n\n我的感受是故事本身并没有特别聚焦，更像是耐心地叙述一段时间（从儿时到中年）。当然阿西尔和保罗的爱恋确实是时间切片中情感色彩非常浓厚的一笔。\n\n坦白说，这本书的阅读体验不如《暮色将尽》。读的过程中我还产生了一个疑问：私人写作如何变成公共阅读？比如一个普通人从现在开始事无巨细且无比诚实的记录自己的生活，是否也是一个有价值的、可供大众阅读的样本？"   },
  {
    "id": "08",
    "title": "桃花源没事儿",
    "author": "马伯庸",
    "cover": "covers/08.jpeg",
    "quote": "我看有点事儿",
    "note": "马伯庸开辟了一条赛道：历史可能性小说。\n\n我们已经读过《太白金星有点烦》《长安的荔枝》《食南之徒》。《太白金星有点烦》解构西游记，《长安的荔枝》源自唐贵妃荔枝典故\"一骑红尘妃子笑，无人知是荔枝来\"。《食南之徒》则源自《史记》西南夷列传的一段记载——中国历史上唯一一例因为一种食物而被灭国的故事。\n\n桃花源自不必说，人人心中都有一个桃花源，它是梦想之地的代名词。\n\n当看到桃花源没事儿这本新书时，我们立刻下单，第一时间去看，结果却大失所望……桃花源怕是出大事儿了……\n\n首先是情节平庸。\n\n只看了两页我就觉得有点不妙，因为和《太白金星有点烦》的文风太像了，有妖怪，有道士，影射职场纷争……但唯独缺少了点桃花源的气质。\n\n读完全文，唯有小道士的命格设定是有意思的，这个小道士\"天生穷命\"，再叠加一个\"明真破妄\"的本领，桃花源俗务道人这差事非他莫属。他只要一碰到钱，哪怕是几文钱，一道天雷都在空中若隐若现，随时准备劈他……\n\n就像《长安的荔枝》中的李善德硬着头皮完成了不可能完成的任务，《食南之徒》中的唐蒙心不甘情不愿阴差阳错成为了乱世英雄，都是很妙的小人物。太白金星职级稍微高点，类似于项目PM，但也卷入天庭和西天的派系之争，千头万绪叫苦不迭，令打工人深深共鸣。\n\n但这本书的整体情节就乏善可陈了，翻完整本看不到太多亮点。\n\n更糟糕的是，这本书反派脸上写了\"我是反派\"。只需要稍微想一下，什么条件的人可以在镜湖旁边完成这场阴谋，这位戴着蚩尤面具的人，藏不住，真的藏不住。所以当反派揭晓的时候，毫无惊喜感可言。\n\n主题倒是可以细品。\n\n桃花源有没有可能就是一种幻境？当你走近时，发现原来是大梦一场。\n\n文中有和桃花源记极其相似的描述：\n桃花源记原文：初极狭，才通人。复行数十步，豁然开朗。\n桃花源没事儿：不知不觉，前方桃林渐稀，山岩之中现出一条狭窄的石穴。这石穴初时极窄，勉强够一人穿过，然后逐渐延展开阔，很快玄穹便觉得眼前一亮，豁然开朗。\n\n然而，在桃花源没事儿中，\"阡陌交通，鸡犬相闻\"\"黄发垂髫，怡然自乐\"的光景，不过是一场幻觉，幻觉褪去，只看到枯骨尸骸。\n\n好似桃花源从来都没有存在过，不过是人们自欺欺人罢了，些许怅然。\n\n\"历史可能性小说\"的确是一条很好的赛道，以基层打工人的视角去重构历史事件。我个人非常喜欢，总是想看马伯庸会如何解构历史，重构一个我们耳熟能详的故事。只是作品完成度有高有低。\n\n我个人心目中的排序是：《太白金星有点烦》＞《长安的荔枝》＞《食南之徒》＞《桃花源没事儿》（目前只读了这四本）。"   },
  {
    "id": "09",
    "title": "十日终焉",
    "author": "杀虫队队员",
    "cover": "covers/09.jpeg",
    "quote": "再见，终焉",
    "note": "我终于看完了《十日终焉》（抹泪），好好看啊…\n坦白讲我读严肃文学比较多，网文到目前为止只读过三本，分别是《撒野》《全球高考》和《十日终焉》。\n一直很好奇网文是如何做到「连载」的。按照我自己的写作习惯，我可能会一口气写完，然后再从头读一遍，从头改一次（往往第二次修改要比第一次信马由缰地写好很多）。\n尤其《十日终焉》并不是一个线性结构，而是一个环形结构，作者的布局谋篇是一盘大棋，一个细微处的伏笔能够跨越一百多个章节！能够按天「连载」出这样的写作质量，真的好厉害。另外从正面连接的报道中看到，虫队并不是一个全职的网文作者，他要上班的……\n我喜欢这本书的理由：\n- 没有感情线\n- 291万字，没有水情节\n- 草蛇灰线，一个伏笔能跨越 125 章\n- 个别人物非常出彩，我最喜欢陈俊南和地鼠，真的要被这两个人笑到头掉\n- 喜欢「回响」的设定，并且回响和每个人的现实人生有关联，比如一个传销头子进入终焉之地的回响就是「扩音」，一个原生家庭不幸、善于读懂空气的\"小英雄\"的回响是「灵嗅」\n小英雄有一段自述我印象很深：\n我茫然的抬起头，夏天的傍晚到处都有人在吵架，邻居在吵架，鸽子在吵架，蝉也在吵架。\n有时候天空也会吵架，天空好像阿爸，打完雷之后会扔下几个雨点，让雨点在地上摔碎。\n然后天空再沉沉地睡去，第二天就像什么事都没发生一样。\n虫队竟然文笔也很好，只能说太全面了。"   },
  {
    "id": "10",
    "title": "小城与不确定性的墙",
    "author": "村上春树",
    "cover": "covers/10.jpeg",
    "quote": "一个跟理想国相去甚远的世界",
    "note": "豆瓣编辑推荐是这样介绍这本书的：71岁村上春树提笔重写17岁不确定的爱恋。我很疑惑，为什么71岁的村上要提笔重写17岁的爱恋？好在，这本书不止于此。\n\n如果以此为题（first love），我认为这本书不算成功，比起初恋的悸动，更多的是对纯爱的某种执念——人一旦品尝过不带丝毫杂念的纯爱，说起来其实就是，心灵的一部分就受到了灼热的照射，在某种意义上就是被烧得一干二净了。当然，这种人生若只如初见的执念，想必也是很多人感同身受的。毕竟人的激情，很可能有且仅有一次。\n\n但这并不是这本书的主题。\n\n更大的主题是，当世界充满不确定性时，我们能够逃往何处？村上用想象力编织了一座小城。\n\n这座小城不是桃花源，也不是乌托邦，小城里的生活极简，甚至可以说是艰苦。\"住在那里的人们，罕言寡语地过着贫乏的生活。分配来的食物既粗糙，量又少，衣服一直要穿到磨薄磨破为止。既没有书籍，也没有音乐。运河干涸无水，许多工厂关门大吉。人们生活于其中的公共住宅昏昏暗暗，歪歪斜斜。狗儿猫儿都不存在。说到举目可以看到的动物，那就只有能够越过高墙来来去去的飞鸟们了。那是一个跟理想国相去甚远的世界。\"\n\n既然如此，人们进入小城的动机是什么？主人公是为了找寻他魂牵梦萦的那个她，还有一位少年，少年与现实世界格格不入。\n\n主人公我和少年，先后成为了小城里的\"读梦人\"。图书馆里取代书籍的，是成行排列着的无数\"旧梦\"——一个很像神秘事务司的存在。要成为\"读梦人\"，他们需要舍弃影子，弄伤双眼。\n\n有意思的是，两位\"读梦人\"，一个最终回归现实世界，一位永远留在小城。本我与影子（意识），究竟在城内还是城外？他们如何做出选择？或许，这取决于他们扎根现实世界有多深。\n\n少年是我印象最深的人物。他总是穿着一件黄色潜水艇的衣服。他每天都在图书馆看书，每一本书都读完，不知疲倦地吸收着书里的知识，就跟食欲旺盛的人在店里总是点最厚的牛排一样。\n\n作者描述，长此以往，孤独的少年心中形成了一种类似于\"智慧柱\"的形态。\"那大概是类似耸立在地底黑暗之中、如同巨大钟乳洞内的石柱一般的东西吧。它气势堂堂地屹立在人迹未至、漆黑一团的暗处，从未有人看到过它。在这样的黑暗之中，说不定二百年也只是不值一提的一瞬。\"\n\n好震撼。\n\n对于写作者而言，最自然而然、最小成本的去处就是图书馆。无论是现实中偏僻小镇的图书馆，小城里陈列\"旧梦\"的图书馆，还是少年——他自己一个人就能够成为一座独立的图书馆——终极的个人图书馆。\n\n我也在想，为什么村上的小城不是理想国或桃花源？或许，他构筑的只是一个逃离的最小单元。\n\n村上的小城，还让我联想起陈春成《裁云记》中的\"洞穴\"：\n我在纸上把有兴趣的学问一门一门列出来。每门研究二十年，以我的寿命够研究一百二十门了。我可以花上一百年在远古的深海前行，一百年去追踪建文帝，再花上几个世纪去死磕永动机，剩下的时间我将在所有洞穴间从容游荡。我将通晓一切草木的名称，熟知所有星星的温度。如果掉进某个陷阱，那就死心塌地，一往无前。晨光熹微中，我的手指从一排书脊上慢慢拂过，像抚摸着琴键，然后停下，抽出一本，就着窗前的光亮，读起来。\n\n如果不是图书馆，哪里会成为你的梦想之地？"   },
  {
    "id": "11",
    "title": "素食者",
    "author": "韩江",
    "cover": "covers/11.jpeg",
    "quote": "忍耐并非美德",
    "note": "韩江是谁？\n\n2024年诺贝尔文学奖揭晓之后，很惭愧，我并不知道谁是韩江。我对韩国文学知之甚少，似乎金爱烂的作品传播更广？我读过金爱烂的《外面是夏天》，一本关于\"失去\"的短篇集，写的很痛。出于好奇，我翻开了《素食者》。\n\n根据个人经验，读诺奖作品，多多少少都会有令人\"不适\"的感受——因为一些扭曲、疯狂、令人战栗的情绪，被写到了极致。比如耶利内克的《钢琴教师》，十年后回想起来，还会觉得刀片深深划过肌肤。\n\n读《素食者》也有类似感受，不舒适，但另一方面也正说明人物塑造的成功。\n\n韩江说，我在写作时，经常会思考这些问题：人类的暴力能达到什么程度；如何界定理智和疯狂；我们能在多大程度上理解别人。我希望《素食者》可以回答我的这些问题。我想通过《素食者》刻画一个誓死不愿加入人类群体的女性。\n\n这个誓死不愿加入人类群体的女性，英惠，想成为一棵树。于是忽然有一天，她不吃肉了。\n\n读完英惠的故事，脑海里只有五个字——他人即地狱。这里的他人不是别人，正是这些认为可以置喙、干涉、甚至逼迫你的亲人。没有无条件的爱，只有无条件的地狱。\n\n看看英惠丈夫的自白：我之所以会跟这样的女人结婚，是因为她没有什么特别的魅力，同时也找不出什么特别的缺点。在她平凡的性格里，根本看不到令人眼前一亮、善于察言观色和成熟稳重的一面。正因为这样，我才觉得舒坦。如此一来，我就没有必要为了博取她的芳心而假装博学多才，也无须为约会迟到而手忙脚乱，更不用自讨没趣地拿自己跟时尚杂志里的男人做比较了。我那二十五岁之后隆起的小腹，和再怎么努力也长不出肌肉的纤瘦四肢，以及总是令我感到自卑的短小阴茎，这些对她来讲都是无关紧要的事。\n\n再看看英惠不吃肉之后，她的父亲是如何逼迫她的：妻子痛苦地挣扎着，岳父用糖醋肉使劲捻着她的嘴唇。纵使岳父用强有力的手指掰开了妻子的双唇，但还是无法抠开她紧咬着的牙齿。怒发冲冠的岳父再次动怒，又一巴掌打在了妻子的脸上。\n\n所以回到韩江提出的问题，我们能多大程度理解别人？在这个故事里显然不太乐观……\n\n故事中的另一位女性，英惠姐姐仁惠，她温厚坚韧，总是独自承受生命里发生的一切。她的艺术家丈夫不仅对家庭收入、育儿没有任何贡献，还借艺术之名和妹妹英惠发生关系，让仁惠的生活彻底走向崩溃。\n\n\"日子还是要过，她背负起难以摆脱的丑闻继续经营着化妆品店。残酷的时间公平得跟水波一样，载着她那仅靠忍耐铸造起的人生一起漂向了下游。\"\n\n她不是一个人，而是群像。联想到《一间自己的房间》里的布朗夫人，只是匆匆一瞥，伍尔夫便察觉到十分整洁、十分瘦小的她，忍受着强烈的痛苦。\n\n真心希望所有女性的人生都不再是靠忍耐铸造起来的。"   },
  {
    "id": "12",
    "title": "一间自己的房间",
    "author": "弗吉尼亚·伍尔夫",
    "cover": "covers/12.jpeg",
    "quote": "个人的天才，去埋没它就等于死亡",
    "note": "即使是没读过这本书的人，大概也听过伍尔夫这句话：\"女人想要写小说，她必须有钱，还要有一间属于自己的房间。\"\n\n为什么女性写小说需要闲暇、金钱，以及一间她自己的房间？\n\n艰辛生活本身已很可怕，但更糟的是——昔日的艰辛生活在内心滋生的恐惧与辛酸的毒素。\n\n\"首先，总是要去干自己不愿意干的工作，而且是像奴隶那样苦干，同时又要谄媚、奉承，或许并非总是必要，然而又似乎有此必要，而自命清高所冒的风险实在太大……\"\n\n恐惧与辛酸的毒素会侵扰写作者的心灵。\"每一件事情都在抗衡制约天才杰作从作家心中完整的产生。狗儿会乱吠；人们会打扰；钱必须去挣；身体会垮掉。\"\n\n伍尔夫举例，简·奥斯汀写《傲慢与偏见》时心态平和，没有仇恨，没有抱怨，没有恐惧，没有抗议，没有说教。但愤怒却损害了夏洛蒂·勃朗特的完整性。在《简·爱》的几个片段中，她离开了她的故事，她应该全心全意去创作的，她却转移注意力去宣泄个人的悲愤。\n\n如果女性不去争取闲暇、金钱和知识自由，牺牲掉的是个人的天才。这也是本书最打动我的一句话——\"个人的天才，去埋没它就等于死亡——才能虽小，对拥有者却弥足珍贵——它正在渐渐毁灭，随之而去的是我的自我，我的灵魂——\"\n\n所以，\"不论用什么方法，我希望你们拥有足够的金钱，可以去旅行，去闲散，去深思这个世界的过去或未来，去看书梦想，去徘徊于街头巷尾，并且让思想的钓线深深地沉入生命的河流。\"\n\n去看这个世界在你的笔下壮丽辉煌地巍然展开。"   },
  {
    "id": "13",
    "title": "简单的激情",
    "author": "安妮·埃尔诺",
    "cover": "covers/13.jpeg",
    "quote": "把激情镌刻在文字里",
    "note": "激情意味着什么？\n\n马洛伊·山多尔曾在《烛烬》中追问：生命的内容不是别的，而是那股有一天打动了我们的内心和灵魂，之后永远燃烧到死的激情？不管在这期间发生了什么？如果我们经历了这个，或许我们就没有白活？\n\n而安妮·埃尔诺在结尾处谈到激情是\"奢侈品\"：\n小的时候，在我看来，奢侈品是毛皮大衣，是长裙，是海边的别墅。后来，我又觉得是一种知识分子的生活。而现在，我觉得是可以对某个男人或者女人抱有一种激情。\n\n我比较倾向于后者。因为激情很可能是一种求而不得的人生体验，如果将它作为人生意义来追寻，求而不得的人生未免显得太过惨淡。而作为\"奢侈品\"，即使缺少它，也可以从漫长的时间中沉淀出某种醇厚的情谊。\n\n《简单的激情》是我近期读过的最短、实体书行间距最大的一本书，大概1小时就能读完。它是一个女性的独白，说的是对一个已婚男人的疯狂迷恋。她试图将激情——这一人生奢侈体验——镌刻在文字里。\n\n比如：\"从去年九月开始，我就只有一件事情，那就是对一个男人的等待：等待他的电话，等待他来。我还和以前完全一样，去超市，去电影院，或是把衣服送到洗衣店，阅读，改稿子，但是我不再会长时间地沉浸在这些事情中，根本不可能，除非付出极大的努力。只有在说话的时候，我还感觉到自己还有活力。我的嘴巴吐出了词语和句子，甚至笑声，而我的思想和我的意愿并未参与其中。甚至对于我那时做了些什么，看过哪些电影，和哪些人见过面，我也只有模糊的记忆。总的说来，我都是装作在行动。\"\n\n又如：\"他一走，巨大的疲劳感袭来，我几乎动弹不了。我不会立刻收拾。我看着玻璃杯，残留着食物的盘子，堆满了烟头的烟灰缸，散落在走廊上、房间里的外衣和内衣，耷拉在地毯上的床单。我情愿听凭这些东西停留在这种乱七八糟的状态，因为每一个物件都意味着一个动作，一个时刻，它组成了一幅画，博物馆里任何一幅画都不曾带给我这样一种力量和痛苦。\"\n\n这份激情是完完全全属于主人公自己的，连被投注激情的那个他，被爱的对象，或许都不知道她从早到晚都在想他。但她却说，\"某种程度上，我比他幸运。\"\n\n特别值得一提的是安妮·埃尔诺的写作观：二十多岁时，她认为文学的目的是改变现实的样貌，无论如何都不应该写人们经历过的事情。\n\n但十年后，她对文学的看法发生了变化：我发觉，写作对我来说只能是这样：通过我所经历的，或者我在周遭世界所生活的和观察到的，把现实揭露出来。第一人称，\"我\"，自然而然地作为一种工具出现，它能够锻造记忆，捕捉和展现我们生活中难以察觉的东西。这个冒着风险说出一切的\"我\"，除了理解和分享之外，没有其他的顾虑。\n\n《简单的激情》也是这个愿望下的结果，通过\"我\"对激情最敏锐、精微、疯狂的感受，唤醒\"我们\"的共同经验。"   },
  {
    "id": "14",
    "title": "心流",
    "author": "米哈里·契克森米哈赖",
    "cover": "covers/14.jpeg",
    "quote": "如何随心所欲地集中注意力",
    "note": "对心流最初的印象，其实并不来自于《心流》这本书，而来自于马伯庸《长安的荔枝》以及陈春成《夜晚的潜水艇》中的两个片段。\n\n当李善德规划出荔枝转运之法时：\n灵感源源不断，毛笔勾画不断，李善德此时进入了一种道家所谓\"入虚静\"的奇妙状态，过往的经验与见识，融汇成一条大河，汪洋恣肆，奔腾咆哮。这一刻，他不是一个人在计算，陈子、刘徽、祖冲之、祖暅之在这一刻魂魄附体。李善德的眼睛满布血丝，却丝毫不觉疲倦，恨不得撬开自己脑壳，一磕到底，把脑浆直接涂抹在纸卷之上。——《长安的荔枝》\n\n当陈春成获得一支传彩笔时：\n我清楚它们的位置，熟练地抓取需要的文字，配成需要的句子。该芬芳的芬芳，灿烂的灿烂。到后来，文字纷纷扬扬从天而降，我像在雪中舞剑，总能在万千雪花中击中最恰当的一朵。当我要使用比喻时，我仿佛洞晓了万物之间隐秘的联系，凭一个比喻就能将彼此接通。所有意象都蹲伏在肘边，听我号令。斟酌音韵就像编织花环一样容易。我熔铸月光，裁剪浮云，掣长鲸于碧海，我统治天上的星星……——《夜晚的潜水艇》\n\n心流，即一个人完全沉浸在某种活动当中，无视其他事物存在的状态。\n\n如何拥有心流体验？它需要高度自律，并且集中注意力。\"体验过心流的人都知道，那份深沉的快乐是严格的自律、集中注意力换来的。\"\n\n每经历一次心流，个人就变得更独特，更难预测，并拥有更非凡的技能。而无法随心所欲地集中注意力，注意力就一定会被当时最棘手的事件所吸引：它会集中于某种真实或想象的痛苦，最近的不快或长期的挫折中。\n\n因此，要获得心流的体验，首先要找到自己的乐趣，比如阅读、攀岩、音乐、社交等等。然后设置目标，全神贯注于这件事情，获得即时的反馈。心流体验是可练习的，例如，\"每晚读诗对心灵的作用，和每天用健身器材锻炼身体的效用相同。\"\n\n对于兴趣而言，上述方法似乎更加容易实现。但对于人生更为复杂的命题——我们如何工作以及我们与他人的关系，还是知易行难……"   },
  {
    "id": "15",
    "title": "多谢不阅",
    "author": "杜布拉夫卡·乌格雷西奇",
    "cover": "covers/15.jpeg",
    "quote": "用一本书的时间吐槽文学乱象",
    "note": "《多谢不阅》是我读的杜布拉夫卡·乌格雷西奇的第四本书。如果你是第一次读她的作品，我会优先推荐《狐狸》《疼痛部》《芭芭雅嘎下了个蛋》。\n\n如题，《多谢不阅》是一部批判性质的作品，一一吐槽了文学世界的诸多乱象：图书市场越发繁荣，装帧越发精致，书店越发引人驻足，作家也从未像现在这样红遍全球，但真正的文学却近乎绝迹。\n\n我看到了几重因素：\n\n其一，文学与钱。\n\"西方文学理论研究体裁、类型、风格、结构、范式、规律……几乎从没有研究过钱在一个文本的生成过程中所起到的作用。\"\n毫无疑问，刻意迎合市场让真文学发生变形。作者毫不掩饰对所谓\"畅销书\"的嗤之以鼻：畅销书是一种意识形态，一种精神世界的圣体，它只提供封闭而简单的价值体系，和一些更为简单而贫瘠的知识。\n\n其二，文学与政治。\n\"我最讨厌的是那些声音最响的人，那些擂战鼓的人，那些把自己写作的技艺卖给政府、政客与军阀做附庸的人，好像他们不是作家，而是小厮。\"\n\n其三，独白（或自恋）文化。\n\"我们今天的文化环境崇尚避免冲突，因此，对话的文化被放逐到了边缘之地，取而代之的是一种独白（或自恋）的文化，已经在包括知识领域在内的各种社会领域牢牢站稳了脚跟。沟通这一全球化幻觉，虽然本应是一种对话，其实践却一直以独白的形式开展。简而言之，每个人都急于向世界输出自己，自我推销已经成为了一种社会惯例。\"\n\n两个问题：\n一个想要穷尽毕生之力，书写真文学的作家，如何在文学乱象中生存下来？\n一个好的读者，是否有足够的耐心和土壤，用大量时间去形成独立判断的素养？（毕竟任何素养的形成，都是要花时间的。）\n\n对于这两个问题，书里没有答案，乐观希望文学的将来里有。\n\n作者本人在尾声中说，本书的主题是\"聒噪炫目的文学生活，与围绕它的各种琐事\"。这本书写于1996-2000年，杜布拉夫卡坦言，当时她对文学的将来抱有极大的怀疑，因此本书的基调是颇为阴郁的。但在2002年，她的观点有所缓和，在大学校园那些展现优秀才能的学生身上，她又重新看到文学的希望。"   },
  {
    "id": "16",
    "title": "芭芭雅嘎下了个蛋",
    "author": "杜布拉夫卡·乌格雷西奇",
    "cover": "covers/16.jpeg",
    "quote": "当女性踉跄着步入老年",
    "note": "读完《狐狸》《疼痛部》之后，再一次惊叹于杜布拉夫卡·乌格雷西奇的文字功力！\n\n今年6月，杜布拉夫卡·乌格雷西奇的新书《芭芭雅嘎下了个蛋》出版，主题是令人心碎的老年——当女人踉跄着步入老年，她们还剩下什么呢？\n\n她的文字，有时出其不意，有时引人发笑，有时冷峻尖锐，有时光怪陆离……\n— 密密麻麻的鸟儿成群结队地飞向高空，呈\"之\"字形上下翻飞，活像是在梳理天空的发丝。\n— 有一次她状况危急，我们叫了救护车。在护士撑住她的腋下，搀扶她走向电梯时，妈妈弯下腰，身手矫健地一把抓过放在门边准备带下楼扔掉的垃圾袋。\n— 老巫婆是对的：死亡是没有味道的，生活才是屎。\n\n或许，一如狐狸是作家的图腾，乌格雷西奇的文字也一如狐狸般狡诈多变。她的文字在我心目中自动形成了一个超绝标准。\n\n再来看几个关于\"她们\"的短句：\n— 她们从你身边滚过，如同一堆干瘪的苹果。\n— 她们行动起来是一支小队，三只小母鸡……\n— 她们在世界中穿梭，就像年迈的天使军团。\n— 她所有的词语都脱落了。\n— 她用新的、更幽暗的音色慢慢地讲话。\n— 她习惯了贫穷，欣然忍受了它，仿佛它是一场躲不过去的大雨。\n— 她和她身体之间的敌对简史。\n— 她是人类的残骸，一片人形的油渣。\n\n所有故事的细节交织在一起，你可以读到历史上女性的遭遇，女性在文化中的位置，衰老以及它带来的问题。"   },
  {
    "id": "17",
    "title": "我们八月见",
    "author": "加西亚·马尔克斯",
    "cover": "covers/17.jpeg",
    "quote": "她一直生活着，却从未观察过生活",
    "note": "《我们八月见》是加西亚·马尔克斯的遗作小说。\n\n我的第一个好奇是，为什么马尔克斯要在晚年有些\"急躁地\"写下这样一本小说？他本人说，创作《霍乱时期的爱情》时，产生了一个想法：爱情是否会随着岁月流逝、年龄增长而改变？\n\n这或许可以阐释本书的主题以及作者的创作动机。尽管在改稿五版之后，马尔克斯对这本书的最终判决是\"这书不行。得把它毁了。\"\n\n这是一个关于她的故事。\n\n她叫安娜，四十六岁，结婚二十七年，婚姻关系和谐，有一个深爱她，同时她也深爱着她的丈夫。故事的开场，给人感觉格外完美，格外平淡，然后她出轨了。\n\n引发蝴蝶效应的开端是她的母亲要求葬在一座小岛上。于是每年的八月十六日，她都要重复这趟旅程，乘坐同一辆出租车，光顾同一家花摊，盯着同样的似火烈日，来到同一处破败的墓地，将一束新鲜的剑兰放到母亲的坟前。以及——连续五年，在这座破败的小岛上，邂逅不同的男人。\n\n第一次出轨之后，她开始注意到完美生活之下的裂缝。\n\n她开始用批判的目光审视自己的日子。\"她开始察觉到她和丈夫的婚姻靠传统意义上的幸福感来维持，他们往往会回避分歧，以免受到伤害。这实际上跟把垃圾藏在地毯下面的做法没有什么分别。\"\n\n无需怀疑马尔克斯编织故事的能力。这5个故事在他笔下，仿佛往地上扔了一个线团，跟随着欲望的线头，自然地向四面八方滚动。让我想到杜布拉夫卡·乌格雷西奇《狐狸》的第一个章节\"故事是如何成为故事的\"——《我们八月见》也是一个阐释故事如何形成的好故事，读起来特别真实。\n\n张秋子《堂吉诃德的眼镜》有一个章节提到\"文学中的老人去哪儿了？\"近期倒是读到一些文学作品中对于中老年女性生命境遇的精彩刻画，比如《暮色将尽》《激情耗尽》等等。《我们八月见》中的她，也是一个独特的，探讨欲望、探讨未被生活消磨的欢愉的文学人物经典。"   },
  {
    "id": "18",
    "title": "我看见的世界",
    "author": "李飞飞",
    "cover": "covers/18.jpeg",
    "quote": "李飞飞和她的北极星",
    "note": "李飞飞是谁？\n\n前谷歌副总裁、谷歌云人工智能及机器学习首席科学家，斯坦福大学人工智能实验室第七任主任。\n\n2009年，她和团队完成了ImageNet的初始版本，标注了1500万张图片，涵盖了2.2万个不同类别——这是当时人工智能史上最大的人工编辑数据集。ImageNet的目标是在每幅图片中嵌入最纯粹的人类感知，希望在整个图像集上训练出来的计算机视觉模型也能迸发出类似人类的智慧火花，进而还原一个真实的世界本体。\n\n在李飞飞自传《我看见的世界》中，有一个词被反复提及——北极星。\n\n\"以北极星来比喻理想，其真正的价值不仅仅在于北极星可以指引方向，更在于无论怎样努力，达到北极星的距离永远是无限的。我们可以为之苦苦追求，可以为之痴迷一生，却永远无法抵达。北极星象征着科学家最独特的品质：充满永不停歇、永无止境的好奇心，这份好奇心跟满足感永远同极相斥。夜空中的一颗星，远方的海市蜃楼，没有尽头的道路。\"\n\n北极星帮李飞飞在两难选择中做出取舍，在一片质疑之声中坚定自我。\n\n第一次是她从普林斯顿大学毕业后，面对现实生活的困窘，是选择华尔街的高薪工作，还是继续求学成为一名科学家？李飞飞在母亲的支持下选择了后者。\n\n第二次是决心做ImageNet时，质疑之声多到\"够听一辈子的\"。但李飞飞还是选择听从内心的声音。\n\n第三次是当ImageNet初版终于问世时，却被\"忽视\"了。但李飞飞还是坚定推动，直到曙光出现，发现ImageNet数据集和卷积神经网络AlexNet之间的天然契合。\n\n北极星很遥远，像一个为之痴迷一生，却永远无法抵达的目标，永远闪耀；但它其实又很近，特别是在你犹豫不决、自我怀疑的时候，北极星是你心中的锚点。\n\n找到北极星并为之付出努力是幸运的，希望我们都能收获这份幸运。"   },
  {
    "id": "19",
    "title": "草民",
    "author": "蔡崇达",
    "cover": "covers/19.jpeg",
    "quote": "她们被命运卡住了",
    "note": "继《皮囊》《命运》之后，蔡崇达又出了新书《草民》，他用十年时间完成了故乡三部曲。\n\n第一时间买了这本书，翻开却有些失望，阅读体验不如《命运》和《皮囊》。于是倒着看，很快读到了全书最有生命力的一个故事，也很贴合\"草民\"的主题。\n\n这个故事是《冲啊，猛虎》。\n\n这里的\"猛虎\"不是别人，而是七个年过七旬的老太，她们自发地组织了一个观音阁义工团，被称为\"观音阁七朵金花\"。\n\n为首的大姐是蔡桂花。她一出场便先声夺人。\n\n她在焦急什么？她坚持认为\"自己要死了\"，风风火火地和众姐妹宣布自己的\"死讯\"之后便告别观音阁，躺在自家前厅等待死亡——但事与愿违。\n\n人生的苦难由此被撕开了一个口子。三姐黄梨花突然哭起来，愧疚地说\"观音阁义工团快被我管没了\"。\n\n观音阁七朵金花，各有各的人生困局。不仅操心自己的苦难，还有子孙的困顿。\n\n是这世道又起风浪了。这风浪从未停下来过。\n\n她们的解决方案是\"找菩萨\"好好说道说道。于是就有了篇名《冲啊，猛虎》，她们如猛虎一般，开10小时的夜车，抢在所有善男信女前面，为菩萨上第一炷头香。\n\n很遗憾，七朵金花没能抢到头香。蔡桂花知道，这里的每一根香，都是某一个老人拼了命的一次挣扎。\n\n她们很努力地活着，思考如何当好一个老人。\"按照蔡桂花的理论，老天爷为什么要让老人反应越来越迟钝，就是想帮忙把老人的耳朵眼睛闭上一些。最难当的老人，便是到老了不仅耳聪目明，而且还格外敏感，看到的担心的东西太多，老在心里放着，痒，比如蔡桂花自己。\""   },
  {
    "id": "20",

    "note": "连续读完马伯庸的三本书：《长安的荔枝》《太白金星有点烦》《食南之徒》，我发现他单独开辟了一条写作赛道——以基层打工人的视角去重构历史事件。\n\n在这个赛道上，他没有对手。\n\n在《长安的荔枝》中，长安小吏李善德临时被委派一项任务：在杨贵妃生日前从岭南运送新鲜荔枝。荔枝保鲜期只有三天，而岭南和长安相隔遥遥五千里。推杯换盏间，这个任务就这样被“甩锅”到了老李的头上，他只得硬着头皮完成这个不可能完成的任务。\n\n《太白金星有点烦》就更妙了。即便是天庭神仙太白金星，也难逃社畜的命运。他是西游路上的打工人，负责策划天庭和西天联合推出的“西天取经” SSS级项目。如何优雅而不失体面地安排九九八十一难，他在天庭和西天这两大派系之中斡旋，叫苦不迭。\n\n马伯庸新书《食南之徒》也有类似的特点，一个热爱美食的芝麻小官唐蒙，阴差阳错地成为了大汉副使，被迫卷入南越国的乱局之中。如果没有这个突发事件，唐蒙恐怕会偏安一隅，优哉游哉地度过一生。毕竟，他本无志向成为什么乱世英雄。\n\n这个故事的确有另一种写法（此处有剧透）。\n\n可能是一种更恢弘，更偏正史的写法 —— 一个人，如何用二十二年时间，为大汉收复南越国开辟一条战略要道。要知道，这条从夜郎通往南越国的要道极其艰难：“那不是坦荡平阔的中原，而是瘴气弥漫、峰峦层叠的西南山区。换了常人，恐怕待上一个月都要崩溃，而唐蒙逢山铺路、遇水架桥，硬是在崇山峻岭之间，开辟出一条直通夜郎的大道，其过程之艰苦卓绝，令长安每一个人包括天子在内，都满怀惊叹和疑惑……”\n\n但如果不从小人物着手，这个故事会失去很多滋味。马伯庸写历史中的小人物确实厉害，读完这三本之后，如果还有类似选题，我依然会看得津津有味。"   },

    "note": "改编经典，第一件事便是对人物形象的解构。\n\n在马伯庸笔下，天庭神仙太白金星沦为职场\"社畜\"，受命策划天庭和西天联合推出的\"西天取经\"重大项目。太白金星的职场搭子观音，也一改此前救苦救难的观世音菩萨形象，变得长袖善舞、苦心钻营。\n\n\"天庭神仙皆社畜，西游路上打工人。\"\n\n《太白金星有点烦》深深戳中打工人痛点，让人不禁直呼：马伯庸到底是在哪里上的班？？？\n\n他对各种职场大病，真的是有很深的洞察。\n\n比如\"派系之争\"，天庭与西天两大势力暗中较量，寸土不让。\n\n比如\"嫡系\"，能准点下班的织女，金蝉子转世的玄奘，能让悟空背锅的玉帝外甥二郎神，都是\"有根脚的\"，他们不必费力攀爬就能平步青云。而\"没有根脚的\"，即便强如齐天大圣孙悟空，也难逃背锅的命运。\n\n比如\"屎上雕花\"，阎罗王要给生死簿扩容，结果直接把生死簿弄崩了，\"让黑无常累白了脸，让白无常累黑了面\"。\n\n比如\"包装产出\"，把九九八十一难写成\"揭帖\"，给这场取经大型表演活动上价值。\n\n打工人在《太白金星有点烦》的故事里照镜子，看见的是自己的职场和人生。对我来说，那个曾经狂放嚣张此刻却满眼冷意的孙悟空，以及为自己的命运讨说法而不得的六耳猕猴，最令我痛心。"   },

    "note": "读完 100 本书之后发现…方法错了？\n\n正巧这个时候看到了张一鸣早年微博推荐的这本书，名字很直接，就叫《如何阅读一本书》。\n\n当然，阅读没有什么对错之分，读总比不读好。《如何阅读一本书》的目标读者是想要提升自身理解能力( Reading for understanding) 的读者，而不仅仅停留在信息获取层面(Reading for information）。\n\n书里还提到一个概念是\"主动阅读\" 。主动阅读的一般规则是：阅读的效果取决于投入了多少心思，同时也包含阅读技巧。\n\n这本书将阅读划分了四个层次：基础阅读、检视阅读、分析阅读和主题阅读。我们直接跳到分析阅读。\n\n分析阅读章节里有一句话是：\"可读性最高的作品是作者达到了建筑学上最完整的整体架构。\" 因此不能只是沉溺于细节，要看整体。\n\n\"对于整体内容这件事，光是一个模糊的认知是不够的，你必须要确切清楚地了解才行。只有一个方法能知道你是否成功了。你必须能用几句话，告诉你自己，或别人，这整本书在说的是什么。\" 换言之，没有做到分析阅读的一个典型表现 —— \"我知道这本书在谈什么，但是我说不出来。\"\n\n分析阅读是更主动的读法，它的下一个阶段\"主题阅读\"要求就更高了，需要去看同一主题下的多部作品。不过，窝在沙发上粗粗略读，能够在一两处细节中和作者产生一瞬间的心心相印也很好~"   },

  const grid = document.getElementById('booksGrid');
  booksData.forEach((book, i) => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.style.animationDelay = `${i * 0.05}s`;

    const coverHTML = book.cover
      ? `<img src="${book.cover}" alt="${book.title}" loading="lazy">`
      : `<div style="width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#f0f0f0,#e0e0e0);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;font-size:18px;color:#999;padding:16px;text-align:center;">${book.title}</div>`;

    card.innerHTML = `
      <div class="book-cover-wrap">
        ${coverHTML}
        ${book.isWishNote ? '<span class="wish-badge">许愿笔记</span>' : ''}
        <div class="sticker-wrap">
          <div class="sticker-note">
            <div class="sticker-tape"></div>
            <p>${book.quote}</p>
          </div>
        </div>
      </div>
      <div class="book-info">
        <h3>${book.isNew ? '<span class="new-badge">new</span>' : ''}《${book.title}》</h3>
        
      </div>`;

    card.addEventListener('click', () => { window.location.hash = 'book/' + book.id; });
    grid.appendChild(card);
  });

  function formatNote(note) {
    if (!note) return '';
    let html = note.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html = html.replace(/「([^」]+)」/g, '<em>「$1」</em>');
    const paragraphs = html.split(/\n{2,}/).filter(p => p.trim());
    if (!paragraphs.length) return '';
    return paragraphs.map((p, i) => {
      const text = p.trim().replace(/\n/g, '<br>');
      return '<p>' + text + '</p>';
    }).join('');
  }

  // Hash routing
  var currentBookId = null;

  function showMainPage() {
    document.getElementById('mainPage').style.display = '';
    document.getElementById('mainFooter').style.display = '';
    document.getElementById('detailPage').style.display = 'none';
    document.title = '有求必应书屋';
    currentBookId = null;
  }

  function showDetailPage(bookId) {
    var book = booksData.find(function(b){ return b.id === bookId; });
    if (!book) { showMainPage(); return; }
    currentBookId = bookId;
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('mainFooter').style.display = 'none';
    document.getElementById('detailPage').style.display = '';
    document.getElementById('detailTitle').textContent = book.detailTitle || '《' + book.title + '》';
    document.getElementById('detailLead').textContent = book.quote;
    document.getElementById('detailNote').innerHTML = formatNote(book.note);
    document.title = (book.detailTitle || '《' + book.title + '》') + ' - 有求必应书屋';
    document.getElementById('commentInput').value = '';
    document.getElementById('commentDone').classList.remove('visible');
    document.getElementById('commentInput').style.display = '';
    document.getElementById('commentSubmit').style.display = '';
    window.scrollTo(0, 0);
  }

  function handleHash() {
    var hash = window.location.hash.slice(1);
    if (hash.startsWith('book/')) {
      showDetailPage(hash.replace('book/', ''));
    } else {
      showMainPage();
    }
  }

  function goHome() { window.location.hash = ''; showMainPage(); }

  window.addEventListener('hashchange', handleHash);
  handleHash();

  // Comment submit
  function submitComment() {
    var input = document.getElementById('commentInput');
    var text = input.value.trim();
    if (!text || !currentBookId) return;
    var book = booksData.find(function(b){ return b.id === currentBookId; });
    fetch('https://formsubmit.co/ajax/26881ae89b19d5a1668b37568bccb62c', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        comment: text,
        book: book ? book.title : currentBookId,
        _subject: '有求必应书屋 · 新评论 - 《' + (book ? book.title : currentBookId) + '》',
        _captcha: 'false',
        _template: 'table'
      })
    });
    input.value = '';
    input.style.display = 'none';
    document.getElementById('commentSubmit').style.display = 'none';
    document.getElementById('commentDone').classList.add('visible');
    setTimeout(function() {
      document.getElementById('commentDone').classList.remove('visible');
      input.style.display = '';
      document.getElementById('commentSubmit').style.display = 'inline-flex';
    }, 3000);
  }

  document.getElementById('commentInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitComment(); }
  });


  
  // Nav scroll shadow
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('mainNav');
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
  });


  // WISH FUNCTIONALITY
  function submitWish() {
    const input = document.getElementById('wishInput');
    const wish = input.value.trim();
    if (!wish) return;
    fetch('https://formsubmit.co/ajax/26881ae89b19d5a1668b37568bccb62c', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        wish: wish,
        _subject: '有求必应书屋 · 新愿望',
        _captcha: 'false',
        _template: 'table'
      })
    });
    input.value = '';
    input.style.display = 'none';
    document.querySelector('.wish-submit').style.display = 'none';
    document.getElementById('wishDone').classList.add('visible');
    setTimeout(function() {
      document.getElementById('wishDone').classList.remove('visible');
      input.style.display = 'block';
      document.querySelector('.wish-submit').style.display = 'inline-flex';
    }, 3000);
  }

  document.getElementById('wishInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      submitWish();
    }
  });

  // CURATED WISHES
  const curatedWishes = [{name:'《活着》',count:1},{name:'《悉达多》',count:3},{name:'《白夜行》',count:2},{name:'《红与黑》',count:1},{name:'《第一性原理》',count:1},{name:'《鼠疫》',count:1},{name:'《事实》',count:1},{name:'《明亮的夜晚🌙🌙🌙》',count:1},{name:'《非暴力沟通》',count:2},{name:'《早上好，岛上好》',count:1},{name:'《三体》',count:1}];
  function renderWishes() {
    const container = document.getElementById('wishesDisplay');
    if (curatedWishes.length === 0) { container.style.display = 'none'; return; }
    container.style.display = 'flex';
    container.innerHTML = curatedWishes.map((w, i) => {
      const rotations = [-2.5, 1.8, -1, 2.2, -0.5, 1.5, -2, 0.8];
      const rot = rotations[i % rotations.length];
      const name = typeof w === 'object' ? w.name : w;
      const count = typeof w === 'object' ? w.count : 1;
      const countHtml = count > 1 ? '<span class="wish-count">+' + count + '</span>' : '';
      return '<div class="wish-card" style="--wish-rotate:' + rot + 'deg"><div class="wish-card-text">' + name + '</div>' + countHtml + '</div>';
    }).join('');
  }
  renderWishes();

</script>
