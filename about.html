<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About · 有求必应书屋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: #ffffff; color: #242424;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    background: rgba(255,255,255,0.9);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: box-shadow 0.3s;
  }
  .nav.scrolled { box-shadow: 0 1px 12px rgba(0,0,0,0.06); }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 20px; font-weight: 600; color: #242424;
    white-space: nowrap; text-decoration: none;
  }
  .nav-brand-icon {
    width: 32px; height: 32px; background: #A8C8E0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: 'Source Serif 4', serif; font-size: 16px; font-weight: 700;
  }
  .nav-brand-text-short { display: none; }
  .nav-links { display: flex; gap: 28px; flex-shrink: 0; }
  .nav-links a {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 15px; color: #6b6b6b; font-weight: 500; transition: color 0.2s;
    text-transform: uppercase; letter-spacing: 0.08em;
    text-decoration: none;
  }
  .nav-links a:hover { color: #9CB5D1; }
  @media (max-width: 600px) {
    .nav-inner { padding: 12px 20px; }
    .nav-links a { font-size: 12px; letter-spacing: 0.04em; }
  }

  /* ABOUT PAGE */
  .about-page {
    max-width: 680px;
    margin: 0 auto;
    padding: 80px 32px 120px;
  }
  .about-icon {
    font-size: 48px;
    margin-bottom: 32px;
  }
  .about-text {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 17px; line-height: 2; color: #242424;
  }
  .about-text p { margin-bottom: 1.6em; }
  .about-text .about-highlight {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 20px; font-weight: 700;
  }
  .about-back {
    display: inline-block;
    margin-top: 48px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 14px; color: #9CB5D1;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  .about-back:hover { color: #6b6b6b; }

  /* FOOTER */
  .footer {
    text-align: center; padding: 32px 20px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px; color: #bbb;
  }
  .footer-brand { font-family: 'Source Serif 4', serif; }

  @media (max-width: 600px) {
    .about-page { padding: 48px 24px 80px; }
    .about-text { font-size: 15px; }
    .about-text .about-highlight { font-size: 18px; }
  }
</style>
</head>
<body>
  <nav class="nav" id="mainNav">
    <div class="nav-inner">
      <div class="nav-brand">
        🪄 <span class="nav-brand-text-full">BookRoom of Requirement</span><span class="nav-brand-text-short">BookRoom</span>
      </div>
      <div class="nav-links">
        <a href="https://www.xiaoyuzhoufm.com/podcast/6255a9fffca6e23c68be96df" target="_blank" rel="noopener">PODCAST</a>
        <a href="about.html">About</a>
      </div>
    </div>
  </nav>

  <div class="about-page">
    <div class="about-icon">🪄</div>
    <div class="about-text">
      <p><span class="about-highlight">欢迎光临有求必应书屋！</span></p>
      <p>线上书店是 AI Coding 的，读书笔记是古法手搓的。</p>
      <p><span class="about-highlight">Enjoy~</span></p>
    </div>
    <a href="index.html" class="about-back">← 返回书屋</a>
  </div>

  <div class="footer">&copy; 2026 <span class="footer-brand">BookRoom of Requirement</span> &middot; Every book deserves a note.</div>

  <script>
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('mainNav');
    if (window.scrollY > 10) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
  });
  </script>
</body>
</html>
