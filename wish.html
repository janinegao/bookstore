<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=3" as="font" type="font/woff2" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>许愿墙 · 有求必应书屋</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: #ffffff;
    color: #242424;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
    min-height: 100vh; overflow-x: hidden;
  }

  @font-face {
    font-family: 'ELEYANG Bonjour';
    src: url('fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=3') format('woff2'),
         url('fonts/ELEYANG-Bonjour-ExtraBold-subset.ttf?v=3') format('truetype');
    font-weight: normal; font-style: normal;
    font-display: block;
  }

  /* NAV - Shakespeare and Company style */
  .nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    background: rgba(255,255,255,0.92);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: box-shadow 0.3s;
  }
  .nav.scrolled { box-shadow: 0 1px 12px rgba(0,0,0,0.06); }
  .nav-inner {
    max-width: 1400px; margin: 0 auto; padding: 14px 32px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .nav-hamburger {
    position: absolute; left: 32px; top: 50%; transform: translateY(-50%);
    cursor: pointer; width: 24px; height: 18px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .nav-hamburger span {
    display: block; width: 100%; height: 2px;
    background: #242424; border-radius: 1px;
    transition: all 0.3s ease;
  }
  .nav-hamburger:hover span { background: #9CB5D1; }
  .nav-brand-center {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 18px; font-weight: 700; color: #242424;
    letter-spacing: 0.08em; white-space: nowrap;
    cursor: pointer; text-decoration: none;
  }
  .nav-brand-center:hover { color: #9CB5D1; }
  .nav-menu {
    position: absolute; left: 32px; top: 100%;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 8px;
    padding: 8px 0;
    min-width: 140px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    display: none; z-index: 200;
  }
  .nav-menu.open { display: block; }
  .nav-menu a {
    display: block; padding: 10px 20px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 14px; color: #6b6b6b; font-weight: 500;
    text-decoration: none; transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .nav-menu a:hover { color: #9CB5D1; background: rgba(156,181,209,0.06); }
  .nav-menu a.active { color: #9CB5D1; }

  /* PAGE *//* PAGE */
  .page {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* HEADER */
  .wish-header {
    padding: 72px 0 16px;
    text-align: center;
  }
  .wish-header-title {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 26px; font-weight: 700;
    color: #242424;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .wish-header-sub {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 13px; color: #999;
    letter-spacing: 0.08em;
  }

  /* WISHES WALL - clustered layout with zone background */
  .wishes-wall {
    position: relative;
    min-height: 420px;
    margin: 24px auto 48px;
    padding: 32px 24px 24px;
    max-width: 680px;
    background: #F2F5F8;
    border-radius: 16px;
    box-shadow: inset 0 0 60px rgba(156,181,209,0.06);
  }

  /* WISH CARD */
  .wish-card {
    display: inline-block;
    background: rgba(248, 244, 232, 0.92);
    border-radius: 2px;
    padding: 14px 22px 12px;
    margin: 5px 5px;
    cursor: default;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    transition: box-shadow 0.4s ease, transform 0.3s ease;
    animation: wishFloat var(--float-dur, 6s) ease-in-out infinite, wishAppear 0.6s ease both;
    animation-delay: var(--float-delay, 0s), var(--appear-delay, 0s);
    position: relative;
    vertical-align: top;
  }
  .wish-card::before {
    content: '';
    position: absolute;
    top: -5px; left: 16px;
    width: 28px; height: 9px;
    background: rgba(156, 181, 209, 0.35);
    transform: rotate(-1.5deg);
    border-radius: 1px;
  }
  .wish-card:hover {
    box-shadow: 0 6px 20px rgba(156, 181, 209, 0.12), 0 2px 6px rgba(0,0,0,0.04);
    transform: translateY(-3px) rotate(0deg);
    z-index: 10;
  }
  .wish-card-text {
    font-family: 'ELEYANG Bonjour', cursive, sans-serif;
    font-size: 15px; font-weight: 700; line-height: 1.4;
    color: #3d3520;
    word-break: break-word;
    white-space: nowrap;
  }
  .wish-count {
    display: inline-block;
    background: rgba(156,181,209,0.2); color: #6b7b8d;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 9px; font-weight: 600;
    padding: 1px 6px; border-radius: 8px;
    margin-left: 5px; vertical-align: middle;
  }

  @keyframes wishFloat {
    0%, 100% { transform: translateY(0) rotate(var(--base-rotate, -1deg)); }
    50% { transform: translateY(var(--float-y, -5px)) rotate(var(--float-rotate, 0.5deg)); }
  }
  @keyframes wishAppear {
    from { opacity: 0; transform: translateY(16px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .wish-card.fly-up {
    animation: flyUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes flyUp {
    0% { opacity: 0; transform: translateY(60px) scale(0.7); }
    40% { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* LIGHT PARTICLES */
  .particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(156, 181, 209, 0.12);
    animation: particleDrift var(--drift-dur, 20s) linear infinite;
    animation-delay: var(--drift-delay, 0s);
  }
  @keyframes particleDrift {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-100vh) translateX(var(--drift-x, 30px)); opacity: 0; }
  }

  /* INPUT */
  .wish-input-area {
    text-align: center;
    padding-top: 20px;
    margin-top: 16px;
    border-top: 1px solid rgba(156,181,209,0.15);
    position: relative; z-index: 2;
  }
  .wish-input-wrap {
    position: relative;
    max-width: 360px;
    margin: 0 auto;
  }
  .wish-input {
    width: 100%; border: none;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    background: transparent; padding: 12px 0; font-size: 16px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    color: #242424;
    outline: none; transition: border-color 0.3s;
    text-align: center;
  }
  .wish-input:focus { border-color: #9CB5D1; }
  .wish-input::placeholder { color: #bbb; font-size: 14px; }
  .wish-submit {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: 1px solid rgba(156,181,209,0.3);
    border-radius: 20px; padding: 6px 20px; margin-top: 16px;
    font-size: 13px; color: #9CB5D1;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    cursor: pointer; transition: all 0.3s ease;
    letter-spacing: 0.06em;
  }
  .wish-submit:hover {
    background: rgba(156,181,209,0.08);
    border-color: #9CB5D1;
    transform: translateY(-1px);
  }
  .wish-done {
    display: none; font-size: 14px; color: #9CB5D1;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    animation: wishFly 0.6s ease;
  }
  .wish-done.visible { display: inline-block; }

  @keyframes wishFly {
    0% { opacity: 0; transform: translateY(12px); }
    60% { opacity: 1; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .nav-inner { padding: 12px 16px; }
    .nav-hamburger { left: 16px; }
    .nav-brand-center { font-size: 15px; letter-spacing: 0.06em; }
    .nav-menu { left: 16px; }
    .page { padding: 0 20px; }
    .wish-header { padding: 56px 0 12px; }
    .wish-header-title { font-size: 22px; }
    .wishes-wall { padding: 16px; min-height: 380px; }
    .wish-card { padding: 10px 16px 8px; margin: 5px 6px; }
    .wish-card-text { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="particles" id="particlesContainer"></div>

<nav class="nav" id="mainNav">
  <div class="nav-inner">
    <div class="nav-hamburger" id="navHamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
    <a class="nav-brand-center" onclick="window.location.href='index.html'" href="javascript:void(0)">有求必应书屋</a>
    <div class="nav-menu" id="navMenu">
      <a href="index.html">首页</a>
      <a href="wish.html" class="active">许愿墙</a>
      <a href="about.html">关于我</a>
    </div>
  </div>
</nav>

<div class="page">

  <div class="wish-header">
    <div class="wish-header-title">往书屋里扔一个愿望</div>
    <div class="wish-header-sub">本书屋将不定期掉落许愿笔记</div>
  </div>

  <div class="wishes-wall">
    <div class="wishes-list" id="wishesList"></div>
    <div class="wish-input-area">
      <div class="wish-input-wrap">
        <input class="wish-input" type="text" id="wishInput" placeholder="写下你想看的书…" autocomplete="off" enterkeyhint="send">
      </div>
      <button class="wish-submit" type="button" onclick="submitWish()">许个愿 →</button>
      <div class="wish-done" id="wishDone">愿望已飞出 🪄</div>
    </div>
  </div>

</div>

<script>
  // Light particles
  (function() {
    var c = document.getElementById('particlesContainer');
    for (var i = 0; i < 12; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = 3 + Math.random() * 4;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.bottom = -(Math.random() * 20) + '%';
      p.style.setProperty('--drift-dur', (18 + Math.random() * 22) + 's');
      p.style.setProperty('--drift-delay', (Math.random() * 15) + 's');
      p.style.setProperty('--drift-x', ((Math.random() - 0.5) * 80) + 'px');
      c.appendChild(p);
    }
  })();

  // Merge curated + localStorage wishes
  var curatedWishes = [
    { text: '活着', count: 1 },
    { text: '悉达多', count: 3 },
    { text: '红与黑', count: 1 },
    { text: '第一性原理', count: 1 },
    { text: '鼠疫', count: 1 },
    { text: '明亮的夜晚', count: 1 },
    { text: '白夜行', count: 2 },
    { text: '事实', count: 1 },
    { text: '非暴力沟通', count: 1 },
    { text: '早上好，岛上好', count: 1 },
    { text: '三体', count: 1 }
  ];

  function getLocalWishes() {
    try { return JSON.parse(localStorage.getItem('bookstoreWishes') || '[]'); }
    catch(e) { return []; }
  }
  function saveLocalWishes(wishes) {
    try { localStorage.setItem('bookstoreWishes', JSON.stringify(wishes)); } catch(e) {}
  }

  function getAllWishes() {
    var local = getLocalWishes();
    var all = curatedWishes.slice();
    local.forEach(function(w) {
      var found = false;
      for (var i = 0; i < all.length; i++) {
        if (all[i].text === w.text) { all[i].count += w.count; found = true; break; }
      }
      if (!found) all.push({ text: w.text, count: w.count });
    });
    return all;
  }

  function renderWishes() {
    var wall = document.getElementById('wishesList');
    wall.innerHTML = '';
    var wishes = getAllWishes();

    wishes.forEach(function(wish, i) {
      var card = document.createElement('div');
      card.className = 'wish-card';

      var displayText = wish.text;
      if (displayText && !displayText.match(/^[《]/)) displayText = '《' + displayText + '》';
      var countHTML = wish.count > 1 ? '<span class="wish-count">+' + wish.count + '</span>' : '';
      card.innerHTML = '<div class="wish-card-text">' + displayText + countHTML + '</div>';

      var br = ((i % 5) - 2) * 1.2;
      card.style.setProperty('--base-rotate', br + 'deg');
      card.style.setProperty('--float-y', -(3 + Math.random() * 5) + 'px');
      card.style.setProperty('--float-rotate', ((Math.random() - 0.5) * 1.5) + 'deg');
      card.style.setProperty('--float-dur', (5 + Math.random() * 5) + 's');
      card.style.setProperty('--float-delay', (Math.random() * 3) + 's');
      card.style.setProperty('--appear-delay', (i * 0.06) + 's');

      wall.appendChild(card);
    });
  }

  function submitWish() {
    var input = document.getElementById('wishInput');
    var text = input.value.trim();
    if (!text) return;

    // Send to FormSubmit
    fetch('https://formsubmit.co/ajax/26881ae89b19d5a1668b37568bccb62c', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ wish: text, _subject: '有求必应书屋 · 新许愿', _captcha: 'false', _template: 'table' })
    });

    // Save locally
    var local = getLocalWishes();
    var found = false;
    for (var i = 0; i < local.length; i++) {
      if (local[i].text === text) { local[i].count++; found = true; break; }
    }
    if (!found) local.push({ text: text, count: 1 });
    saveLocalWishes(local);

    // Fly-up animation
    var wall = document.getElementById('wishesList');
    var card = document.createElement('div');
    card.className = 'wish-card fly-up';
    card.addEventListener('animationend', function() {
      this.classList.remove('fly-up');
      var br = ((Math.random() - 0.5) * 3);
      this.style.setProperty('--base-rotate', br + 'deg');
      this.style.setProperty('--float-y', -(3 + Math.random() * 5) + 'px');
      this.style.setProperty('--float-rotate', ((Math.random() - 0.5) * 1.5) + 'deg');
      this.style.setProperty('--float-dur', (5 + Math.random() * 5) + 's');
      this.style.setProperty('--float-delay', '0s');
      this.style.animation = 'wishFloat ' + (5 + Math.random() * 5) + 's ease-in-out infinite';
    });
    var displayText = text;
    if (displayText && !displayText.match(/^[《]/)) displayText = '《' + displayText + '》';
    card.innerHTML = '<div class="wish-card-text">' + displayText + '</div>';
    list.appendChild(card);

    input.value = '';
    document.getElementById('wishDone').classList.add('visible');
    setTimeout(function() { document.getElementById('wishDone').classList.remove('visible'); }, 3000);
  }

  document.getElementById('wishInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitWish(); }
  });

  
  function toggleMenu() {
    var menu = document.getElementById('navMenu');
    menu.classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    var hamburger = document.getElementById('navHamburger');
    var menu = document.getElementById('navMenu');
    if (menu && hamburger && !hamburger.contains(e.target) && !menu.contains(e.target)) {
      menu.classList.remove('open');
    }
  });
  window.addEventListener('scroll', function() {
    var nav = document.getElementById('mainNav');
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
  });

  window.addEventListener('scroll', function() {
    var nav = document.getElementById('mainNav');
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
  });

  renderWishes();
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderWishes, 200);
  });
</script>

</body>
</html>
