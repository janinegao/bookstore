<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=3" as="font" type="font/woff2" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>许愿墙 · 有求必应书屋</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: linear-gradient(175deg, #0a0d14 0%, #111827 40%, #151c2c 100%); color: #e8e4df;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
    min-height: 100vh; overflow-x: hidden;
  }

  @font-face {
    font-family: 'ELEYANG Bonjour';
    src: url('fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=3') format('woff2'),
         url('fonts/ELEYANG-Bonjour-ExtraBold-subset.ttf?v=3') format('truetype');
    font-weight: normal; font-style: normal;
    font-display: swap;
  }

  /* NAV - dark variant */
  .nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    background: rgba(10, 13, 20, 0.82);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: box-shadow 0.3s;
  }
  .nav.scrolled { box-shadow: 0 1px 12px rgba(0,0,0,0.3); }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 20px; font-weight: 600; color: #e8e4df;
    white-space: nowrap; cursor: pointer;
  }
  .nav-brand-text-short { display: none; }
  .nav-links { display: flex; gap: 28px; flex-shrink: 0; }
  .nav-links a {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 15px; color: #8a92a6; font-weight: 500; transition: color 0.2s;
    text-decoration: none;
  }
  .nav-links a:hover { color: #9CB5D1; }
  .nav-links a.active { color: #9CB5D1; }

  /* STARS */
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: rgba(220, 215, 200, 0.35);
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.7; }
  }

  /* PAGE */
  .page {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* HEADER */
  .wish-header {
    padding: 80px 0 40px;
    text-align: center;
  }
  .wish-header-title {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 28px; font-weight: 700;
    color: #e8e4df;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .wish-header-sub {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 13px; color: #5a6480;
    letter-spacing: 0.08em;
  }

  /* WISHES SKY */
  .wishes-sky {
    position: relative;
    min-height: 420px;
    margin-bottom: 48px;
    padding: 20px 0;
  }

  /* WISH CARD - floating glowing paper */
  .wish-card {
    position: absolute;
    background: rgba(245, 240, 228, 0.93);
    border-radius: 2px;
    padding: 14px 22px 12px;
    cursor: default;
    box-shadow: 0 2px 20px rgba(255, 210, 130, 0.12), 0 0 48px rgba(255, 200, 110, 0.06);
    transition: box-shadow 0.4s ease;
    animation: wishFloat var(--float-dur, 6s) ease-in-out infinite, wishAppear 0.8s ease both;
    animation-delay: var(--float-delay, 0s), var(--appear-delay, 0s);
  }
  .wish-card::before {
    content: '';
    position: absolute;
    top: -5px; left: 16px;
    width: 28px; height: 9px;
    background: rgba(156, 181, 209, 0.22);
    transform: rotate(-1.5deg);
    border-radius: 1px;
  }
  .wish-card:hover {
    box-shadow: 0 8px 36px rgba(255, 210, 130, 0.25), 0 0 72px rgba(255, 200, 110, 0.1);
    z-index: 10;
  }
  .wish-card-text {
    font-family: 'ELEYANG Bonjour', cursive, sans-serif;
    font-size: 15px; font-weight: 700; line-height: 1.4;
    color: #3d3520;
    word-break: break-word;
    white-space: nowrap;
  }
  .wish-count {
    display: inline-block;
    background: rgba(156,181,209,0.2); color: #5a7a9a;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 9px; font-weight: 600;
    padding: 1px 6px; border-radius: 8px;
    margin-left: 5px; vertical-align: middle;
  }

  @keyframes wishFloat {
    0%, 100% { transform: translateY(0) rotate(var(--base-rotate, -1deg)); }
    50% { transform: translateY(var(--float-y, -8px)) rotate(var(--float-rotate, 0.5deg)); }
  }
  @keyframes wishAppear {
    from { opacity: 0; transform: translateY(30px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .wish-card.fly-up {
    animation: flyUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes flyUp {
    0% { opacity: 0; transform: translateY(120px) scale(0.7) rotate(0deg); }
    40% { opacity: 1; }
    100% { opacity: 1; }
  }

  /* INPUT */
  .wish-input-area {
    text-align: center;
    padding-bottom: 100px;
    position: relative; z-index: 2;
  }
  .wish-input-label {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 12px; color: #4a5470;
    margin-bottom: 16px;
    letter-spacing: 0.08em;
  }
  .wish-input-wrap {
    position: relative;
    max-width: 360px;
    margin: 0 auto;
  }
  .wish-input {
    width: 100%; border: none;
    border-bottom: 1px solid rgba(156, 181, 209, 0.2);
    background: transparent; padding: 12px 0; font-size: 16px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    color: #e8e4df;
    outline: none; transition: border-color 0.3s;
    text-align: center;
  }
  .wish-input:focus { border-color: #9CB5D1; }
  .wish-input::placeholder { color: #3e4660; font-size: 14px; }
  .wish-submit {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: 1px solid rgba(156,181,209,0.25);
    border-radius: 20px; padding: 6px 20px; margin-top: 16px;
    font-size: 13px; color: #9CB5D1;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    cursor: pointer; transition: all 0.3s ease;
    letter-spacing: 0.06em;
  }
  .wish-submit:hover {
    background: rgba(156,181,209,0.08);
    border-color: rgba(156,181,209,0.5);
    transform: translateY(-1px);
  }
  .wish-done {
    display: none; font-size: 14px; color: #9CB5D1;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    animation: wishFly 0.6s ease;
  }
  .wish-done.visible { display: inline-block; }

  @keyframes wishFly {
    0% { opacity: 0; transform: translateY(12px); }
    60% { opacity: 1; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .nav-inner { padding: 8px 12px; flex-wrap: wrap; justify-content: center; gap: 2px; }
    .nav-brand { font-size: 14px; gap: 4px; width: 100%; justify-content: center; }
    .nav-links { gap: 20px; justify-content: center; }
    .nav-links a { font-size: 12px; }
    .nav-brand-text-full { display: none; }
    .nav-brand-text-short { display: inline; }
    .page { padding: 0 20px; }
    .wish-header { padding: 60px 0 32px; }
    .wish-header-title { font-size: 24px; }
    .wishes-sky { min-height: 350px; }
    .wish-card { padding: 10px 16px 8px; }
    .wish-card-text { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="stars" id="starsContainer"></div>

<nav class="nav" id="mainNav">
  <div class="nav-inner">
    <div class="nav-brand" onclick="window.location.href='index.html'">
      🪄 <span class="nav-brand-text-full">BookRoom of Requirement</span><span class="nav-brand-text-short">BookRoom</span>
    </div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="wish.html" class="active">许愿墙</a>
      <a href="about.html">关于我</a>
    </div>
  </div>
</nav>

<div class="page">

  <div class="wish-header">
    
    <div class="wish-header-title">本书屋将不定期掉落许愿笔记</div>
  </div>

  <div class="wishes-sky" id="wishesSky"></div>

  <div class="wish-input-area">

    <div class="wish-input-wrap">
      <input class="wish-input" type="text" id="wishInput" placeholder="写下你想看的书…" autocomplete="off" enterkeyhint="send">
    </div>
    <button class="wish-submit" type="button" onclick="submitWish()">许个愿 →</button>
    <div class="wish-done" id="wishDone">愿望已飞出 🪄</div>
  </div>

</div>

<script>
  // Stars
  (function() {
    var c = document.getElementById('starsContainer');
    for (var i = 0; i < 50; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.width = (1 + Math.random() * 2) + 'px';
      s.style.height = s.style.width;
      s.style.setProperty('--dur', (3 + Math.random() * 5) + 's');
      s.style.setProperty('--delay', (Math.random() * 5) + 's');
      c.appendChild(s);
    }
  })();

  var curatedWishes = [
    { text: '活着', count: 1 },
    { text: '悉达多', count: 3 },
    { text: '红与黑', count: 1 },
    { text: '第一性原理', count: 1 },
    { text: '鼠疫', count: 1 },
    { text: '明亮的夜晚', count: 1 },
    { text: '白夜行', count: 2 },
    { text: '事实', count: 1 },
    { text: '非暴力沟通', count: 1 },
    { text: '早上好，岛上好', count: 1 },
    { text: '三体', count: 1 }
  ];

  function renderWishes() {
    var sky = document.getElementById('wishesSky');
    sky.innerHTML = '';
    var sw = sky.offsetWidth;
    var sh = sky.offsetHeight || 420;

    curatedWishes.forEach(function(wish, i) {
      var card = document.createElement('div');
      card.className = 'wish-card';

      var displayText = wish.text;
      if (displayText && !displayText.match(/^[《]/)) displayText = '《' + displayText + '》';
      var countHTML = wish.count > 1 ? '<span class="wish-count">+' + wish.count + '</span>' : '';
      card.innerHTML = '<div class="wish-card-text">' + displayText + countHTML + '</div>';

      var cols = 4, rows = Math.ceil(curatedWishes.length / cols);
      var col = i % cols, row = Math.floor(i / cols);
      var cellW = sw / cols, cellH = sh / rows;
      var left = cellW * col + 10 + Math.random() * (cellW - 90);
      var top = cellH * row + 10 + Math.random() * (cellH - 50);
      left = Math.max(0, Math.min(left, sw - 120));
      top = Math.max(0, Math.min(top, sh - 50));

      card.style.left = left + 'px';
      card.style.top = top + 'px';

      var br = ((i % 5) - 2) * 1.5;
      card.style.setProperty('--base-rotate', br + 'deg');
      card.style.setProperty('--float-y', -(6 + Math.random() * 8) + 'px');
      card.style.setProperty('--float-rotate', ((Math.random() - 0.5) * 2) + 'deg');
      card.style.setProperty('--float-dur', (5 + Math.random() * 4) + 's');
      card.style.setProperty('--float-delay', (Math.random() * 3) + 's');
      card.style.setProperty('--appear-delay', (i * 0.08) + 's');

      sky.appendChild(card);
    });
  }

  function submitWish() {
    var input = document.getElementById('wishInput');
    var text = input.value.trim();
    if (!text) return;
    fetch('https://formsubmit.co/ajax/26881ae89b19d5a1668b37568bccb62c', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ wish: text, _subject: '有求必应书屋 · 新许愿', _captcha: 'false', _template: 'table' })
    });

    var sky = document.getElementById('wishesSky');
    var card = document.createElement('div');
    card.className = 'wish-card fly-up';
    card.addEventListener('animationend', function() {
      this.classList.remove('fly-up');
      this.style.animation = 'wishFloat ' + (5 + Math.random() * 4) + 's ease-in-out infinite';
    });
    var displayText = text;
    if (displayText && !displayText.match(/^[《]/)) displayText = '《' + displayText + '》';
    card.innerHTML = '<div class="wish-card-text">' + displayText + '</div>';
    card.style.left = (sky.offsetWidth / 2 - 40 + Math.random() * 40) + 'px';
    card.style.top = (sky.offsetHeight - 60) + 'px';
    card.style.setProperty('--base-rotate', ((Math.random() - 0.5) * 3) + 'deg');
    sky.appendChild(card);

    input.value = '';
    document.getElementById('wishDone').classList.add('visible');
    setTimeout(function() { document.getElementById('wishDone').classList.remove('visible'); }, 3000);
  }

  document.getElementById('wishInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitWish(); }
  });

  window.addEventListener('scroll', function() {
    var nav = document.getElementById('mainNav');
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
  });

  renderWishes();
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderWishes, 200);
  });
</script>

</body>
</html>
