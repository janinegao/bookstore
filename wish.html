<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=3" as="font" type="font/woff2" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>许愿墙 · 有求必应书屋</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: #ffffff; color: #242424;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }

  @font-face {
    font-family: 'ELEYANG Bonjour';
    src: url('fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=3') format('woff2'),
         url('fonts/ELEYANG-Bonjour-ExtraBold-subset.ttf?v=3') format('truetype');
    font-weight: normal; font-style: normal;
    font-display: swap;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    background: rgba(255,255,255,0.9);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: box-shadow 0.3s;
  }
  .nav.scrolled { box-shadow: 0 1px 12px rgba(0,0,0,0.06); }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 20px; font-weight: 600; color: #242424;
    white-space: nowrap; cursor: pointer;
  }
  .nav-brand-text-short { display: none; }
  .nav-links { display: flex; gap: 28px; flex-shrink: 0; }
  .nav-links a {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 15px; color: #6b6b6b; font-weight: 500; transition: color 0.2s;
    text-decoration: none;
  }
  .nav-links a:hover { color: #9CB5D1; }
  .nav-links a.active { color: #9CB5D1; }

  /* PAGE */
  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* HEADER */
  .wish-header {
    padding: 96px 0 52px;
    text-align: center;
  }
  .wish-header-icon {
    font-size: 28px;
    margin-bottom: 20px;
    display: inline-block;
    animation: gentleFloat 4s ease-in-out infinite;
  }
  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    33% { transform: translateY(-6px) rotate(2deg); }
    66% { transform: translateY(-3px) rotate(-1deg); }
  }
  .wish-header-title {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 28px; font-weight: 700;
    color: #242424;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }
  .wish-header-sub {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 14px; color: #9CB5D1;
    letter-spacing: 0.06em;
  }

  /* WISHES DISPLAY */
  .wishes-display {
    display: flex; flex-wrap: wrap; gap: 16px;
    justify-content: center;
    margin-bottom: 48px;
    padding: 0 4px;
  }
  .wish-card {
    position: relative;
    background: #fff;
    border: 1px solid rgba(156,181,209,0.12);
    padding: 12px 20px 10px;
    border-radius: 2px;
    transform: rotate(var(--wish-rotate, -1.5deg));
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    cursor: default;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .wish-card::before {
    content: '';
    position: absolute;
    top: -5px; left: 14px;
    width: 32px; height: 10px;
    background: rgba(156, 181, 209, 0.2);
    transform: rotate(-2deg);
    border-radius: 1px;
  }
  .wish-card:hover {
    transform: rotate(0deg) translateY(-8px);
    box-shadow: 0 12px 32px rgba(156,181,209,0.12), 0 2px 6px rgba(0,0,0,0.04);
    border-color: rgba(156,181,209,0.25);
  }
  .wish-card-text {
    font-family: 'ELEYANG Bonjour', cursive, sans-serif;
    font-size: 16px; font-weight: 700; line-height: 1.4;
    color: #5a6a7d;
    word-break: break-word;
  }
  .wish-count {
    display: inline-block;
    background: rgba(156,181,209,0.15); color: #7a9ab5;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px; font-weight: 600;
    padding: 1px 7px; border-radius: 8px;
    margin-left: 6px; vertical-align: middle;
  }

  /* SPARKLES - tiny floating dots */
  .sparkle {
    position: fixed;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(156,181,209,0.3);
    pointer-events: none;
    animation: sparkleFloat var(--dur) ease-in-out infinite;
    opacity: 0;
    z-index: 0;
  }
  @keyframes sparkleFloat {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
    30% { opacity: 0.6; }
    70% { opacity: 0.4; }
    50% { transform: translateY(-40px) scale(1); }
  }

  /* INPUT AREA */
  .wish-input-area {
    text-align: center;
    padding-bottom: 100px;
  }
  .wish-input-label {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 13px; color: #9CB5D1;
    margin-bottom: 16px;
    letter-spacing: 0.06em;
  }
  .wish-input-wrap {
    position: relative;
    max-width: 400px;
    margin: 0 auto;
  }
  .wish-input {
    width: 100%; border: none;
    border-bottom: 1px solid rgba(156, 181, 209, 0.25);
    background: transparent; padding: 12px 0; font-size: 16px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    color: #242424;
    outline: none; transition: border-color 0.3s;
    text-align: center;
  }
  .wish-input:focus { border-color: #9CB5D1; }
  .wish-input::placeholder { color: #c0c8d2; font-size: 14px; }
  .wish-submit {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: 1px solid rgba(156,181,209,0.3);
    border-radius: 20px; padding: 6px 20px; margin-top: 16px;
    font-size: 13px; color: #9CB5D1;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    cursor: pointer; transition: all 0.3s ease;
    letter-spacing: 0.06em;
  }
  .wish-submit:hover {
    background: rgba(156,181,209,0.08);
    border-color: rgba(156,181,209,0.5);
    transform: translateY(-1px);
  }
  .wish-done {
    display: none; font-size: 15px; color: #9CB5D1;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    animation: wishFly 0.6s ease;
  }
  .wish-done.visible { display: inline-block; }

  @keyframes wishFly {
    0% { opacity: 0; transform: translateY(12px); }
    60% { opacity: 1; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .nav-inner { padding: 8px 12px; flex-wrap: wrap; justify-content: center; gap: 2px; }
    .nav-brand { font-size: 14px; gap: 4px; width: 100%; justify-content: center; }
    .nav-links { gap: 20px; justify-content: center; }
    .nav-links a { font-size: 12px; }
    .nav-brand-text-full { display: none; }
    .nav-brand-text-short { display: inline; }
    .page { padding: 0 20px; }
    .wish-header { padding: 64px 0 36px; }
    .wish-header-title { font-size: 24px; }
    .wishes-display { gap: 12px; }
    .wish-card { padding: 10px 16px 8px; }
    .wish-card-text { font-size: 14px; }
  }
</style>
</head>
<body>

<nav class="nav" id="mainNav">
  <div class="nav-inner">
    <div class="nav-brand" onclick="window.location.href='index.html'">
      🪄 <span class="nav-brand-text-full">BookRoom of Requirement</span><span class="nav-brand-text-short">BookRoom</span>
    </div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="wish.html" class="active">许愿墙</a>
      <a href="about.html">关于我</a>
    </div>
  </div>
</nav>

<div class="page">

  <div class="wish-header">
    <div class="wish-header-icon">🪄</div>
    <div class="wish-header-title">许愿墙</div>
    <div class="wish-header-sub">在书屋里许一个愿，它会被听见</div>
  </div>

  <div class="wishes-display" id="wishesDisplay"></div>

  <div class="wish-input-area">
    <div class="wish-input-label">写下你想看的书</div>
    <div class="wish-input-wrap">
      <input class="wish-input" type="text" id="wishInput" placeholder="书屋将不定期掉落最新笔记…" autocomplete="off" enterkeyhint="send">
    </div>
    <button class="wish-submit" type="button" onclick="submitWish()">许个愿 →</button>
    <div class="wish-done" id="wishDone">愿望已飞出 🪄</div>
  </div>

</div>

<script>
  // Subtle floating sparkles
  (function() {
    var count = 12;
    for (var i = 0; i < count; i++) {
      var el = document.createElement('div');
      el.className = 'sparkle';
      el.style.left = (10 + Math.random() * 80) + '%';
      el.style.top = (20 + Math.random() * 70) + '%';
      el.style.setProperty('--dur', (6 + Math.random() * 8) + 's');
      el.style.animationDelay = (Math.random() * 8) + 's';
      el.style.width = (2 + Math.random() * 3) + 'px';
      el.style.height = el.style.width;
      document.body.appendChild(el);
    }
  })();

  // Curated wishes
  var curatedWishes = [
    { text: '活着', count: 1 },
    { text: '悉达多', count: 3 },
    { text: '红与黑', count: 1 },
    { text: '第一性原理', count: 1 },
    { text: '鼠疫', count: 1 },
    { text: '明亮的夜晚', count: 1 },
    { text: '白夜行', count: 2 },
    { text: '事实', count: 1 },
    { text: '非暴力沟通', count: 1 },
    { text: '早上好，岛上好', count: 1 },
    { text: '三体', count: 1 }
  ];

  function renderWishes() {
    var display = document.getElementById('wishesDisplay');
    display.innerHTML = '';
    curatedWishes.forEach(function(wish, i) {
      var card = document.createElement('div');
      card.className = 'wish-card';
      var rotate = ((i % 5) - 2) * 1.2;
      card.style.setProperty('--wish-rotate', rotate + 'deg');
      card.style.animation = 'fadeInUp 0.4s ease ' + (i * 0.06) + 's both';
      var countHTML = wish.count > 1 ? '<span class="wish-count">+' + wish.count + '</span>' : '';
      var displayText = wish.text;
      if (displayText && !displayText.match(/^[《]/)) {
        displayText = '《' + displayText + '》';
      }
      card.innerHTML = '<div class="wish-card-text">' + displayText + countHTML + '</div>';
      display.appendChild(card);
    });
  }

  function submitWish() {
    var input = document.getElementById('wishInput');
    var text = input.value.trim();
    if (!text) return;
    fetch('https://formsubmit.co/ajax/26881ae89b19d5a1668b37568bccb62c', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        wish: text,
        _subject: '有求必应书屋 · 新许愿',
        _captcha: 'false',
        _template: 'table'
      })
    });
    input.value = '';
    document.getElementById('wishDone').classList.add('visible');
    setTimeout(function() {
      document.getElementById('wishDone').classList.remove('visible');
    }, 3000);
  }

  document.getElementById('wishInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitWish(); }
  });

  // Nav scroll shadow
  window.addEventListener('scroll', function() {
    var nav = document.getElementById('mainNav');
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
  });

  renderWishes();
</script>

</body>
</html>
