<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=3" as="font" type="font/woff2" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wish Wall · 有求必应书屋</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: #ffffff; color: #242424;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }

  @font-face {
    font-family: 'ELEYANG Bonjour';
    src: url('fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=3') format('woff2'),
         url('fonts/ELEYANG-Bonjour-ExtraBold-subset.ttf?v=3') format('truetype');
    font-weight: normal; font-style: normal;
    font-display: swap;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    background: rgba(255,255,255,0.9);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: box-shadow 0.3s;
  }
  .nav.scrolled { box-shadow: 0 1px 12px rgba(0,0,0,0.06); }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 20px; font-weight: 600; color: #242424;
    white-space: nowrap; cursor: pointer;
  }
  .nav-brand-text-short { display: none; }
  .nav-links { display: flex; gap: 28px; flex-shrink: 0; }
  .nav-links a {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 15px; color: #6b6b6b; font-weight: 500; transition: color 0.2s;
    text-transform: uppercase; letter-spacing: 0.08em;
    text-decoration: none;
  }
  .nav-links a:hover { color: #9CB5D1; }
  .nav-links a.active { color: #9CB5D1; }

  /* PAGE */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* HEADER */
  .wish-header {
    padding: 80px 0 48px;
    text-align: center;
  }
  .wish-header-cn {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 15px; color: #6b6b6b; letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .wish-header-en {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 28px; font-weight: 600; color: #242424;
    letter-spacing: 0.06em;
  }

  /* WISHES DISPLAY */
  .wishes-display {
    display: flex; flex-wrap: wrap; gap: 14px;
    justify-content: center;
    margin-bottom: 40px;
  }
  .wish-card {
    position: relative;
    background: rgba(156,181,209,0.06);
    border: 1px solid rgba(156,181,209,0.15);
    padding: 12px 20px 10px;
    border-radius: 2px;
    transform: rotate(var(--wish-rotate, -1.5deg));
    transition: all 0.3s ease;
    cursor: default;
  }
  .wish-card:hover {
    transform: rotate(0deg) translateY(-3px);
    box-shadow: 2px 4px 14px rgba(0,0,0,0.08);
  }
  .wish-card::before {
    content: '';
    position: absolute;
    top: -4px; left: 12px;
    width: 32px; height: 10px;
    background: rgba(156, 181, 209, 0.3);
    transform: rotate(-2deg);
    border-radius: 1px;
  }
  .wish-card-text {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 14px; font-weight: 400; line-height: 1.4;
    color: #3d3520;
    word-break: break-word;
  }
  .wish-count {
    display: inline-block;
    background: #A8C8E0; color: #fff;
    font-size: 10px; font-weight: 600;
    padding: 1px 6px; border-radius: 8px;
    margin-left: 6px; vertical-align: middle;
  }

  /* INPUT AREA */
  .wish-input-area {
    text-align: center;
    padding-top: 0;
    padding-bottom: 80px;
  }
  .wish-input {
    width: 100%; max-width: 440px; border: none;
    border-bottom: 1px solid rgba(156, 181, 209, 0.35);
    background: transparent; padding: 10px 0; font-size: 15px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif; color: #242424;
    outline: none; transition: border-color 0.3s;
    margin: 0 auto; display: block;
  }
  .wish-input:focus { border-color: #9CB5D1; }
  .wish-input::placeholder { color: #bbb; font-size: 14px; }
  .wish-submit {
    display: inline-flex; align-items: center; gap: 3px;
    background: #A8C8E0; border: none;
    border-radius: 3px; padding: 4px 10px; margin-top: 10px;
    font-size: 12px; color: #fff;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    cursor: pointer; transition: all 0.3s ease;
    letter-spacing: 0.06em;
  }
  .wish-submit:hover { background: #8aa4c0; }
  .wish-done {
    display: none; font-size: 15px; color: #9CB5D1;
    font-family: sans-serif;
    animation: fadeInUp 0.5s ease;
  }
  .wish-done.visible { display: inline-block; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .nav-inner { padding: 8px 12px; flex-wrap: wrap; justify-content: center; gap: 2px; }
    .nav-brand { font-size: 14px; gap: 4px; width: 100%; justify-content: center; }
    .nav-links { gap: 20px; justify-content: center; }
    .nav-links a { font-size: 12px; letter-spacing: 0.04em; }
    .nav-brand-text-full { display: none; }
    .nav-brand-text-short { display: inline; }
    .page { padding: 0 20px; }
    .wish-header { padding: 56px 0 32px; }
    .wish-header-en { font-size: 22px; }
  }
</style>
</head>
<body>

<nav class="nav" id="mainNav">
  <div class="nav-inner">
    <div class="nav-brand" onclick="window.location.href='index.html'">
      🪄 <span class="nav-brand-text-full">BookRoom of Requirement</span><span class="nav-brand-text-short">BookRoom</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="wish.html" class="active">WISH WALL</a>
      <a href="about.html">About</a>
    </div>
  </div>
</nav>

<div class="page">

  <div class="wish-header">
    <div class="wish-header-cn">「许愿墙」</div>
    <div class="wish-header-en">WISH WALL</div>
  </div>

  <div class="wishes-display" id="wishesDisplay"></div>

  <div class="wish-input-area">
    <input class="wish-input" type="text" id="wishInput" placeholder="写下你想看的书...本书屋将不定期掉落最新笔记🪄" autocomplete="off" enterkeyhint="send">
    <button class="wish-submit" type="button" onclick="submitWish()">许个愿 →</button>
    <div class="wish-done" id="wishDone">愿望已飞出 🪄</div>
  </div>

</div>

<script>
  // Curated wishes (deduplicated, with counts)
  var curatedWishes = [
    { text: '活着', count: 1 },
    { text: '悉达多', count: 3 },
    { text: '红与黑', count: 1 },
    { text: '第一性原理', count: 1 },
    { text: '鼠疫', count: 1 },
    { text: '明亮的夜晚', count: 1 },
    { text: '白夜行', count: 2 },
    { text: '事实', count: 1 },
    { text: '非暴力沟通', count: 1 },
    { text: '早上好，岛上好', count: 1 },
    { text: '三体', count: 1 }
  ];

  function renderWishes() {
    var display = document.getElementById('wishesDisplay');
    display.innerHTML = '';
    curatedWishes.forEach(function(wish, i) {
      var card = document.createElement('div');
      card.className = 'wish-card';
      var rotate = ((i % 5) - 2) * 1.2;
      card.style.setProperty('--wish-rotate', rotate + 'deg');
      var countHTML = wish.count > 1 ? '<span class="wish-count">' + wish.count + '</span>' : '';
      var displayText = wish.text;
      // Wrap book names with 《》 if not already present
      if (displayText && !displayText.match(/^[《]/)) {
        displayText = '《' + displayText + '》';
      }
      card.innerHTML = '<div class="wish-card-text">' + displayText + countHTML + '</div>';
      display.appendChild(card);
    });
  }

  function submitWish() {
    var input = document.getElementById('wishInput');
    var text = input.value.trim();
    if (!text) return;
    fetch('https://formsubmit.co/ajax/26881ae89b19d5a1668b37568bccb62c', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        wish: text,
        _subject: '有求必应书屋 · 新许愿',
        _captcha: 'false',
        _template: 'table'
      })
    });
    input.value = '';
    document.getElementById('wishDone').classList.add('visible');
    setTimeout(function() {
      document.getElementById('wishDone').classList.remove('visible');
    }, 3000);
  }

  document.getElementById('wishInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitWish(); }
  });

  // Nav scroll shadow
  window.addEventListener('scroll', function() {
    var nav = document.getElementById('mainNav');
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
  });

  renderWishes();
</script>

</body>
</html>
