<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=4" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/ELEYANG-Bonjour-Bold-subset.woff2?v=1" as="font" type="font/woff2" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>有求必应书屋·许愿墙</title>
<style>
  /* Noto Serif SC - Local Subset */
  @font-face {
    font-family: 'Noto Serif SC';
    src: url('https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/NotoSerifSC-Regular-subset.woff2?v=1') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Noto Serif SC';
    src: url('https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/NotoSerifSC-Bold-subset.woff2?v=1') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  /* Noto Sans SC - Local Subset */
  @font-face {
    font-family: 'Noto Sans SC';
    src: url('https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/NotoSansSC-Regular-subset.woff2?v=1') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Noto Sans SC';
    src: url('https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/NotoSansSC-Medium-subset.woff2?v=1') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  /* ===== Theme Variables ===== */
  :root, [data-theme="light"] {
    --bg-primary: #ffffff;
    --bg-nav: rgba(255,255,255,0.9);
    --bg-nav-scrolled-shadow: rgba(0,0,0,0.06);
    --text-primary: #242424;
    --text-secondary: #6b6b6b;
    --text-tertiary: #999;
    --accent: #9CB5D1;
    --accent-hover: #8aa4c0;
    --accent-light: #A8C8E0;
    --border-subtle: rgba(0,0,0,0.06);
    --sticker-bg: rgba(242, 235, 213, 0.92);
    --sticker-text: #3d3520;
    --sticker-ribbon: rgba(156, 181, 209, 0.45);
    --wish-input-border: rgba(156, 181, 209, 0.35);
    --placeholder: #bbb;
    --card-shadow: rgba(0,0,0,0.12);
    --card-shadow-hover: rgba(0,0,0,0.18);
    --no-cover-bg-from: #f0f0f0;
    --no-cover-bg-to: #e0e0e0;
    --highlight-bg: rgba(255,235,59,0.2);
    --detail-bg: #ffffff;
    --detail-border: rgba(0,0,0,0.06);
    --bg-secondary: #F2F5F8;
    --accent-dot: #9CB5D1;
    --log-date-color: var(--accent);
  }
  [data-theme="dark"] {
    --bg-primary: #1f1f1f;
    --bg-nav: rgba(31,31,31,0.92);
    --bg-nav-scrolled-shadow: rgba(0,0,0,0.3);
    --text-primary: #e8e8e8;
    --text-secondary: #999;
    --text-tertiary: #666;
    --accent: #9CB5D1;
    --accent-hover: #b0c8e0;
    --accent-light: #7a9ab8;
    --border-subtle: rgba(255,255,255,0.08);
    --sticker-bg: rgba(242, 235, 213, 0.92);
    --sticker-text: #3d3520;
    --sticker-ribbon: rgba(156,181,209,0.4);
    --wish-input-border: rgba(156,181,209,0.25);
    --placeholder: #555;
    --card-shadow: rgba(0,0,0,0.4);
    --card-shadow-hover: rgba(0,0,0,0.55);
    --no-cover-bg-from: #2a2a2a;
    --no-cover-bg-to: #222;
    --highlight-bg: transparent;
    --bg-secondary: #2a2a2a;
    --detail-bg: #1f1f1f;
    --detail-border: rgba(255,255,255,0.08);
  }


  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: var(--detail-bg);
    color: var(--text-primary);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
    min-height: 100vh; overflow-x: hidden;
  }

  @font-face {
    font-family: 'ELEYANG Bonjour';
    src: url('https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/ELEYANG-Bonjour-ExtraBold-subset.woff2?v=4') format('woff2'),
         url('https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/ELEYANG-Bonjour-ExtraBold-subset.ttf?v=4') format('truetype');
    font-weight: 800; font-style: normal;
    font-display: block;
  }
  @font-face {
    font-family: 'ELEYANG Wish';
    src: url('https://cdn.jsdelivr.net/gh/janinegao/bookstore@main/fonts/ELEYANG-Bonjour-Bold-subset.woff2?v=1') format('woff2');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    background: var(--bg-nav);
    border-bottom: 1px solid var(--border-subtle);
    transition: box-shadow 0.3s;
  }
  .nav.scrolled { box-shadow: 0 1px 12px var(--bg-nav-scrolled-shadow); }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 14px 32px;
    display: flex; align-items: center;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 17px; font-weight: 500; color: var(--text-secondary);
    white-space: nowrap;
  }
  .nav-brand-icon {
    width: 32px; height: 32px; background: var(--accent-light); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: 'Source Serif 4', serif; font-size: 16px; font-weight: 700;
  }
  .nav-links { display: flex; gap: 28px; flex-shrink: 0; align-items: center; margin-left: auto; }
  .nav-brand-text-short { display: none; }
  .nav-links a {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 17px; color: var(--text-secondary); font-weight: 500; transition: color 0.2s;
    text-decoration: none;
  }
  .nav-links a:hover { color: var(--accent); }

  /* PAGE *//* PAGE */
  .page {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* HEADER */
  .wish-header {
    padding: 72px 0 16px;
    text-align: center;
  }
  .wish-header-title {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 26px; font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .wish-header-sub {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 13px; color: var(--text-tertiary);
    letter-spacing: 0.08em;
  }

  /* WISHES WALL - clustered layout with zone background */
  .wishes-wall {
    position: relative;
    min-height: 420px;
    margin: 24px auto 48px;
    padding: 32px 24px 24px;
    max-width: 680px;
    background: var(--bg-secondary, #F2F5F8);
    border-radius: 16px;
    box-shadow: inset 0 0 60px rgba(156,181,209,0.06);
  }

  .wish-section {
    margin-bottom: 28px;
  }
  .wish-section-label {
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    font-size: 14px;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    margin-bottom: 14px;
    padding-left: 4px;
  }
  /* WISH CARD */
  .wish-card {
    display: inline-block;
    background: rgba(248, 244, 232, 0.92);
    border-radius: 2px;
    padding: 14px 22px 12px;
    margin: 5px 5px;
    cursor: default;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    transition: box-shadow 0.4s ease, transform 0.3s ease;
    animation: wishFloat var(--float-dur, 6s) ease-in-out infinite, wishAppear 0.6s ease both;
    animation-delay: var(--float-delay, 0s), var(--appear-delay, 0s);
    position: relative;
    vertical-align: top;
  }
  .wish-card::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%) rotate(var(--tape-rotate, 0deg));
    width: 36px;
    height: 12px;
    background: rgba(156, 181, 209, 0.35);
    border-radius: 1px;
    pointer-events: none;
  }

  .wish-card:hover {
    box-shadow: 0 6px 20px rgba(156, 181, 209, 0.12), 0 2px 6px rgba(0,0,0,0.04);
    transform: translateY(-3px) rotate(0deg);
    z-index: 10;
  }
  .wish-card-text {
    font-family: 'ELEYANG Wish', cursive, sans-serif;
    font-size: 20px; font-weight: 700; line-height: 1.5;
    color: var(--sticker-text);
    word-break: break-word;
    white-space: nowrap;
  }
  .wish-count {
    display: inline-block;
    background: rgba(156,181,209,0.2); color: var(--text-tertiary);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 9px; font-weight: 600;
    padding: 1px 6px; border-radius: 8px;
    margin-left: 5px; vertical-align: middle;
  }

  @keyframes wishFloat {
    0%, 100% { transform: translateY(0) rotate(var(--base-rotate, -1deg)); }
    50% { transform: translateY(var(--float-y, -5px)) rotate(var(--float-rotate, 0.5deg)); }
  }
  @keyframes wishAppear {
    from { opacity: 0; transform: translateY(16px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .wish-card.fly-up {
    animation: flyUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  @keyframes flyUp {
    0% { opacity: 0; transform: translateY(60px) scale(0.7); }
    40% { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* LIGHT PARTICLES */
  .particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(156, 181, 209, 0.12);
    animation: particleDrift var(--drift-dur, 20s) linear infinite;
    animation-delay: var(--drift-delay, 0s);
  }
  @keyframes particleDrift {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-100vh) translateX(var(--drift-x, 30px)); opacity: 0; }
  }

  /* INPUT */
  .wish-input-area {
    text-align: center;
    padding-top: 20px;
    margin-top: 16px;
    position: relative; z-index: 2;
  }
  .wish-input-wrap {
    position: relative;
    max-width: 360px;
    margin: 0 auto;
  }
  .wish-input {
    width: 100%; border: none;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    background: transparent; padding: 12px 0; font-size: 16px;
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    color: var(--text-primary);
    outline: none; transition: border-color 0.3s;
    text-align: center;
  }
  .wish-input:focus { border-color: var(--accent); }
  .wish-input::placeholder { color: var(--placeholder); font-size: 14px; }
  .wish-submit {
    display: inline-flex; align-items: center; gap: 4px;
    background: transparent; border: 1px solid rgba(156,181,209,0.3);
    border-radius: 20px; padding: 6px 20px; margin-top: 16px;
    font-size: 13px; color: var(--accent);
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    cursor: pointer; transition: all 0.3s ease;
    letter-spacing: 0.06em;
  }
  .wish-submit:hover {
    background: rgba(156,181,209,0.08);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .wish-done {
    display: none; font-size: 14px; color: var(--accent);
    font-family: 'Noto Serif SC', 'Source Serif 4', Georgia, serif;
    animation: wishFly 0.6s ease;
  }
  .wish-done.visible { display: inline-block; }

  @keyframes wishFly {
    0% { opacity: 0; transform: translateY(12px); }
    60% { opacity: 1; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }


  /* Theme Toggle */
  .theme-toggle {
    background: none; border: none; cursor: pointer;
    padding: 4px 6px; border-radius: 4px;
    color: var(--text-secondary); display: inline-flex; align-items: center;
    vertical-align: middle;
    transition: color 0.2s, background 0.2s;
  }
  .theme-toggle:hover { color: var(--accent); background: var(--border-subtle); }
  body, .nav { transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease; }

  @media (max-width: 600px) {
    .nav-inner { padding: 8px 12px; flex-wrap: wrap; justify-content: center; gap: 2px; }
    .nav-brand { font-size: 15px; gap: 4px; width: 100%; justify-content: center; }
    .nav-links { gap: 20px; justify-content: center; margin-left: 0; }
    .nav-links a { font-size: 15px; letter-spacing: 0.04em; }
    .theme-toggle { padding: 2px 4px; }
    .page { padding: 0 20px; }
    .wish-header { padding: 56px 0 12px; }
    .wish-header-title { font-size: 22px; }
    .wishes-wall { padding: 16px; min-height: 380px; }
    .wish-card { padding: 10px 16px 8px; margin: 5px 6px; }
    .wish-card-text { font-size: 17px; }
  }
</style>
</head>
<body>

<div class="particles" id="particlesContainer"></div>

<nav class="nav" id="mainNav">
  <div class="nav-inner">
    <div class="nav-brand" style="cursor:pointer;" onclick="window.location.href='index.html'">
      🪄 <span class="nav-brand-text-full">BookRoom of Requirement</span><span class="nav-brand-text-short">BookRoom</span>
    </div>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="wish.html">许愿墙</a>
      <a href="about.html">关于我</a>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色模式"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      </div>
  </div>
</nav>

<div class="page">

<div class="wish-header"><div class="wish-header-title">许愿墙</div></div>

  <div class="wishes-wall">
    <div class="wish-section">
      <div class="wish-section-label">已完成</div>
      <div class="wishes-list" id="wishesFulfilled"></div>
    </div>
    <div class="wish-section">
      <div class="wish-section-label">已许愿</div>
      <div class="wishes-list" id="wishesPending"></div>
    </div>
    <div class="wish-input-area">
      <div class="wish-input-wrap">
        <input class="wish-input" type="text" id="wishInput" placeholder="写下你想看的书...书屋将不定期掉落许愿笔记🪄" autocomplete="off" enterkeyhint="send">
      </div>
      <button class="wish-submit" type="button" onclick="submitWish()">许个愿 →</button>
      <div class="wish-done" id="wishDone">愿望已飞出 🪄</div>
    </div>
  </div>

</div>

<script>
  // Light particles
  (function() {
    var c = document.getElementById('particlesContainer');
    for (var i = 0; i < 12; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = 3 + Math.random() * 4;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.bottom = -(Math.random() * 20) + '%';
      p.style.setProperty('--drift-dur', (18 + Math.random() * 22) + 's');
      p.style.setProperty('--drift-delay', (Math.random() * 15) + 's');
      p.style.setProperty('--drift-x', ((Math.random() - 0.5) * 80) + 'px');
      c.appendChild(p);
    }
  })();

  // Merge curated + localStorage wishes
  var curatedWishes = [
    { text: '活着', count: 1 },
    { text: '悉达多', count: 3, fulfilled: true },
    { text: '红与黑', count: 1 },
    { text: '第一性原理', count: 1 },
    { text: '鼠疫', count: 1 },
    { text: '明亮的夜晚', count: 1 },
    { text: '白夜行', count: 2 },
    { text: '事实', count: 1 },
    { text: '非暴力沟通', count: 1 },
    { text: '早上好，岛上好', count: 1 },
    { text: '三体', count: 1 },
    { text: '舆论', count: 1 },
    { text: '老派少女购物路线', count: 1 }
  ];

  function getLocalWishes() {
    try { return JSON.parse(localStorage.getItem('bookstoreWishes') || '[]'); }
    catch(e) { return []; }
  }
  function saveLocalWishes(wishes) {
    try { localStorage.setItem('bookstoreWishes', JSON.stringify(wishes)); } catch(e) {}
  }

  function getAllWishes() {
    var local = getLocalWishes();
    var all = curatedWishes.slice();
    local.forEach(function(w) {
      var found = false;
      for (var i = 0; i < all.length; i++) {
        if (all[i].text === w.text) { all[i].count += w.count; found = true; break; }
      }
      if (!found) all.push({ text: w.text, count: w.count });
    });
    return all;
  }

  function createWishCard(wish, i) {
    var card = document.createElement('div');
    card.className = 'wish-card';

    var displayText = wish.text;
    if (displayText && !displayText.match(/^[《]/)) displayText = '《' + displayText + '》';
    var countHTML = wish.count > 1 ? '<span class="wish-count">+' + wish.count + '</span>' : '';
    card.innerHTML = '<div class="wish-card-text">' + displayText + countHTML + '</div>';

    var br = ((i % 5) - 2) * 1.2;
    card.style.setProperty('--base-rotate', br + 'deg');
    card.style.setProperty('--float-y', -(3 + Math.random() * 5) + 'px');
    card.style.setProperty('--float-rotate', ((Math.random() - 0.5) * 1.5) + 'deg');
    card.style.setProperty('--float-dur', (5 + Math.random() * 5) + 's');
    card.style.setProperty('--float-delay', (Math.random() * 3) + 's');
    card.style.setProperty('--appear-delay', (i * 0.06) + 's');
    card.style.setProperty('--tape-rotate', ((Math.random() - 0.5) * 8) + 'deg');

    return card;
  }

  function renderWishes() {
    var fulfilledWall = document.getElementById('wishesFulfilled');
    var pendingWall = document.getElementById('wishesPending');
    fulfilledWall.innerHTML = '';
    pendingWall.innerHTML = '';
    var wishes = getAllWishes();

    var fi = 0, pi = 0;
    wishes.forEach(function(wish) {
      if (wish.fulfilled) {
        fulfilledWall.appendChild(createWishCard(wish, fi++));
      } else {
        pendingWall.appendChild(createWishCard(wish, pi++));
      }
    });
  }

  function submitWish() {
    var input = document.getElementById('wishInput');
    var text = input.value.trim();
    if (!text) return;

    // Send to FormSubmit
    fetch('https://formsubmit.co/ajax/26881ae89b19d5a1668b37568bccb62c', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ wish: text, _subject: '有求必应书屋 · 新许愿', _captcha: 'false', _template: 'table' })
    });

    // Save locally
    var local = getLocalWishes();
    var found = false;
    for (var i = 0; i < local.length; i++) {
      if (local[i].text === text) { local[i].count++; found = true; break; }
    }
    if (!found) local.push({ text: text, count: 1 });
    saveLocalWishes(local);

    // Fly-up animation
    var wall = document.getElementById('wishesPending');
    var card = document.createElement('div');
    card.className = 'wish-card fly-up';
    card.addEventListener('animationend', function() {
      this.classList.remove('fly-up');
      var br = ((Math.random() - 0.5) * 3);
      this.style.setProperty('--base-rotate', br + 'deg');
      this.style.setProperty('--float-y', -(3 + Math.random() * 5) + 'px');
      this.style.setProperty('--float-rotate', ((Math.random() - 0.5) * 1.5) + 'deg');
      this.style.setProperty('--float-dur', (5 + Math.random() * 5) + 's');
      this.style.setProperty('--float-delay', '0s');
      this.style.animation = 'wishFloat ' + (5 + Math.random() * 5) + 's ease-in-out infinite';
    });
    var displayText = text;
    if (displayText && !displayText.match(/^[《]/)) displayText = '《' + displayText + '》';
    card.innerHTML = '<div class="wish-card-text">' + displayText + '</div>';
    wall.appendChild(card);

    input.value = '';
    document.getElementById('wishDone').classList.add('visible');
    setTimeout(function() { document.getElementById('wishDone').classList.remove('visible'); }, 3000);
  }

  document.getElementById('wishInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitWish(); }
  });

  
  window.addEventListener('scroll', function() {
    var nav = document.getElementById('mainNav');
    if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
  });

  renderWishes();
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderWishes, 200);
  });

  // Theme toggle
  function getTheme() {
    const saved = localStorage.getItem('bookstore-theme');
    if (saved) return saved;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon = theme === 'dark' ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    document.querySelectorAll('.theme-toggle').forEach(b => b.innerHTML = icon);
    localStorage.setItem('bookstore-theme', theme);
  }
  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }
  applyTheme(getTheme());
</script>
